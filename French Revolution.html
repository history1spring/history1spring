<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>French Revolution</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Nanum+Myeongjo:wght@400;700;800&display=swap');

        :root {
            --bg-color: #2c3e50;
            --card-bg: #d8d0bd;
            --text-color: #2c3e50;
            --accent: #c0392b; 
            --bar-fill: rgba(39, 174, 96, 0.9);
            --choice-left: #315f9a;
            --choice-left-shadow: #1f3f6d;
            --choice-right: #b97812;
            --choice-right-shadow: #7f4f08;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Nanum Myeongjo', serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* [1] 시작 화면 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #002395 0%, #1a1a1a 50%, #ed2939 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .start-box {
            background: rgba(0, 0, 0, 0.6); padding: 40px; border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.5); box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 500px; width: 95%; backdrop-filter: blur(5px); animation: fadeIn 1s ease-out;
        }
        .start-btn {
            padding: 15px 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer;
            background: #fdf5e6; color: #2c3e50; border: none; border-radius: 50px;
            font-family: 'Nanum Myeongjo'; transition: transform 0.2s; margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .start-btn:hover { transform: scale(1.05); }

        /* [2] 게임 화면 */
        #game-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; min-height: 100vh; padding: 12px; animation: slideUp 0.8s ease-out;
        }

        /* 스탯 UI */
        .stats-container { display: flex; gap: 10px; margin-bottom: 16px; width: min(340px, calc(100vw - 24px)); justify-content: space-between; }
        .stat-wrapper { 
            display: flex; flex-direction: column; align-items: center; gap: 5px; width: 25%; 
            position: relative; 
        }
        
        .stat-icon {
            width: 50px; height: 50px; border-radius: 50%; background: #34495e; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
            overflow: hidden; 
            border: 2px solid #ecf0f1; z-index: 1;
        }
        
        .indicator-dot {
            position: absolute; top: 0px; right: 5px; width: 12px; height: 12px;
            background-color: #f1c40f; border: 2px solid #fff; border-radius: 50%;
            display: none; z-index: 10; box-shadow: 0 0 5px #f1c40f; 
            animation: bounceDot 0.5s infinite alternate;
        }
        .indicator-dot.dot-small {
            width: 8px; height: 8px; right: 8px; top: 3px;
            box-shadow: 0 0 4px #f1c40f;
        }
        .indicator-dot.dot-large {
            width: 18px; height: 18px; right: 1px; top: -4px;
            background-color: #ff8f00; box-shadow: 0 0 10px #ff8f00;
        }

        .emoji-layer { position: relative; z-index: 5; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stat-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bar-fill); height: 50%; 
            transition: height 0.5s; z-index: 1; opacity: 0.8;
        }
        .stat-danger .stat-icon {
            border-color: #ff6b5f;
            box-shadow: 0 0 0 3px rgba(231,76,60,0.35), 0 0 18px rgba(231,76,60,0.75);
        }
        .stat-danger .stat-bar { background: #e74c3c !important; animation: pulseBar 0.5s infinite alternate; }
        .stat-danger .stat-label { color: #ffb8b0; }
        .stat-danger::after {
            content: "!";
            position: absolute; top: -5px; right: 7px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #e74c3c; color: #fff; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font: 800 0.85rem Arial, sans-serif;
            z-index: 20; box-shadow: 0 0 10px rgba(231,76,60,0.85);
        }
        .stat-critical .stat-icon {
            border-color: #ff2d1f;
            box-shadow: 0 0 0 4px rgba(231,76,60,0.5), 0 0 26px rgba(231,76,60,0.95);
            animation: dangerShake 0.35s infinite alternate;
        }
        .stat-critical::after { transform: scale(1.12); }
        .stat-label { font-size: 0.8rem; font-weight: bold; color: #ecf0f1; text-shadow: 1px 1px 2px black; }

        /* 인벤토리 */
        .inventory-container {
            display: flex; gap: 10px; margin-bottom: 14px; width: min(340px, calc(100vw - 24px)); justify-content: center;
            background: rgba(0,0,0,0.2); padding: 8px; border-radius: 10px;
            position: relative; z-index: 50; /* 인벤토리 자체 레이어 높임 */
        }
        .item-slot {
            width: 45px; height: 45px; background: rgba(255,255,255,0.1); border: 1px dashed #7f8c8d;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: help; position: relative; transition: all 0.3s;
        }
        .item-slot.active { background: rgba(255,255,255,0.9); border: 2px solid #f1c40f; box-shadow: 0 0 15px #f1c40f; transform: scale(1.1); cursor: pointer; }
        
        /* 툴팁 스타일 (수정됨) */
        .item-slot[data-tooltip]:hover::after {
            content: attr(data-tooltip); 
            position: absolute; 
            bottom: 130%; /* 슬롯보다 더 위로 */
            left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.95); 
            color: #fff; 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            z-index: 9999; /* 최상단 보장 */
            pointer-events: none;
            
            /* 줄바꿈 및 크기 설정 */
            white-space: pre-wrap; /* 줄바꿈 문자(\n) 인식 */
            width: 200px; /* 넉넉한 너비 */
            text-align: center;
            line-height: 1.4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #7f8c8d;
        }
        /* 툴팁 화살표 */
        .item-slot[data-tooltip]:hover::before {
            content: ''; position: absolute; bottom: 110%; left: 50%; margin-left: -6px;
            border-width: 6px; border-style: solid; border-color: transparent transparent transparent transparent;
            border-top-color: rgba(0,0,0,0.95); z-index: 9999;
        }

        /* 카드 영역 */
        .game-area { position: relative; width: min(320px, calc(100vw - 24px)); height: min(440px, calc(100vh - 290px)); min-height: 340px; margin-top: 18px; z-index: 1; }
        .year-display {
            position: absolute; top: -50px; width: 100%; text-align: center;
            color: #ecf0f1; font-family: 'Cinzel'; font-size: 2.2rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .card {
            width: 100%; height: 100%; background:
                linear-gradient(180deg, rgba(236,231,216,0.96), rgba(205,196,176,0.98)),
                repeating-linear-gradient(90deg, rgba(62,43,32,0.045) 0 1px, transparent 1px 58px),
                repeating-linear-gradient(0deg, rgba(62,43,32,0.055) 0 1px, transparent 1px 7px);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; padding: 25px;
            border: 6px solid #4f4639;
            overflow: hidden;
        }
        .card::before {
            content: "";
            position: absolute; inset: 12px;
            border: 1px solid rgba(62,43,32,0.28);
            pointer-events: none;
        }
        .card > * {
            position: relative;
            z-index: 1;
        }
        .card-image {
            width: 100%; height: 150px; background:
                radial-gradient(circle at 50% 54%, rgba(238,234,221,0.52) 0 25%, transparent 26%),
                repeating-linear-gradient(90deg, rgba(62,43,32,0.08) 0 1px, transparent 1px 36px),
                repeating-linear-gradient(0deg, rgba(62,43,32,0.08) 0 1px, transparent 1px 6px),
                linear-gradient(135deg, rgba(33,70,139,0.1), transparent 36%, rgba(174,28,40,0.1)),
                #c9c0ad;
            margin-bottom: 18px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; font-size: 5rem;
            color: #3b332b; border: 3px solid #4f4639; position: relative;
            box-shadow: inset 0 0 26px rgba(36,28,22,0.22), 0 2px 0 rgba(255,255,255,0.18);
            overflow: hidden; line-height: 1; text-shadow: 0 2px 0 rgba(238,234,221,0.42), 0 8px 12px rgba(36,28,22,0.24);
            filter: grayscale(0.25) sepia(0.12) saturate(0.78);
        }
        .card-image::before {
            content: "";
            position: absolute; inset: 8px;
            border: 1px solid rgba(62,43,32,0.34);
            pointer-events: none;
        }
        .card-image::after {
            display: none;
        }
        .npc-badge {
            position: absolute; top: 14px; right: 14px; background: #5c3a21; color: #f4e4bc;
            padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); transform: rotate(4deg);
            border: 1px solid rgba(244,228,188,0.6);
            z-index: 5;
        }
        .card-title {
            font-family: 'Cinzel', serif; font-size: 1.4rem; margin-bottom: 10px; text-align: center;
            border-bottom: 2px double var(--accent); padding-bottom: 5px; color: var(--accent); width: 100%;
        }
        .card-desc { 
            font-size: 1.1rem; text-align: center; line-height: 1.5; flex: 1; 
            display: flex; align-items: center; justify-content: center; 
            word-break: normal; word-wrap: break-word; overflow-wrap: break-word;
        }

        /* 컨트롤 */
        .controls { width: min(320px, calc(100vw - 24px)); display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; margin-bottom: 8px; }
        .btn {
            width: 48%; min-height: 60px; padding: 10px; border: none; border-radius: 12px;
            font-family: 'Nanum Myeongjo'; font-weight: bold; font-size: 0.95rem;
            cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.3); transition: transform 0.1s, filter 0.15s; color: white;
            display: flex; align-items: center; justify-content: center; text-align: center; word-break: keep-all; line-height: 1.3;
        }
        .btn:hover { filter: brightness(1.08); }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-left { background: var(--choice-left); box-shadow: 0 5px 0 var(--choice-left-shadow); }
        .btn-right { background: var(--choice-right); box-shadow: 0 5px 0 var(--choice-right-shadow); }

        /* 애니메이션 */
        .swipe-left { transform: translateX(-150%) rotate(-30deg) !important; opacity: 0; transition: 0.3s ease-in !important; }
        .swipe-right { transform: translateX(150%) rotate(30deg) !important; opacity: 0; transition: 0.3s ease-in !important; }

        /* 팝업 */
        #ending-overlay, #item-popup, #passive-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 300;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 30px;
        }
        #ending-overlay {
            background:
                radial-gradient(circle at 50% 35%, rgba(231,76,60,0.18), transparent 34%),
                rgba(16, 11, 9, 0.94);
        }
        #item-popup, #passive-popup { background: rgba(0,0,0,0.85); z-index: 200; }
        .pop-card { background: #fff; color: #333; padding: 30px; border-radius: 20px; width: 320px; box-shadow: 0 0 50px rgba(255,255,255,0.2); animation: popIn 0.3s; }
        .ending-card {
            width: min(560px, calc(100vw - 36px));
            max-height: calc(100vh - 36px);
            overflow-y: auto;
            background:
                linear-gradient(180deg, rgba(224,219,204,0.98), rgba(195,187,168,0.99)),
                repeating-linear-gradient(90deg, rgba(42,29,21,0.045) 0 1px, transparent 1px 64px),
                repeating-linear-gradient(0deg, rgba(42,29,21,0.06) 0 1px, transparent 1px 7px);
            color: #2a1d15;
            border: 7px double #3d3328;
            box-shadow: 0 24px 70px rgba(0,0,0,0.7), inset 0 0 44px rgba(36,28,22,0.18);
            padding: 64px 28px 32px;
            position: relative;
            animation: popIn 0.3s;
        }
        .ending-card::before {
            content: "혁명 정부 공보";
            position: absolute; top: 18px; left: 28px; right: 28px;
            padding-bottom: 8px;
            border-bottom: 3px double rgba(42,29,21,0.56);
            color: rgba(42,29,21,0.74);
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0;
            pointer-events: none;
        }
        .ending-card::after {
            content: "";
            display: block;
            width: 100%;
            height: 8px;
            margin: 20px auto 0;
            background: linear-gradient(90deg, rgba(33,70,139,0.72) 0 33.33%, rgba(224,219,204,0.7) 33.33% 66.66%, rgba(174,28,40,0.72) 66.66% 100%);
            opacity: 0.85;
        }
        #ending-overlay #end-icon {
            width: 92px; height: 92px; margin: 0 auto 18px !important;
            display: flex; align-items: center; justify-content: center;
            background: rgba(224,219,204,0.72);
            border: 4px double #4f4639;
            border-radius: 50%;
            box-shadow: inset 0 0 18px rgba(42,29,21,0.22);
            font-size: 4rem !important;
            filter: grayscale(0.18) sepia(0.1);
        }
        #ending-overlay #end-reason {
            font-family: 'Nanum Myeongjo', serif !important;
            font-size: clamp(1.7rem, 8vw, 2.6rem);
            font-weight: 800;
            letter-spacing: 0;
            text-shadow: 0 1px 0 rgba(255,255,255,0.55);
        }
        #ending-overlay #end-desc {
            max-width: 100% !important;
            margin: 20px auto 0 !important;
            color: #3e2b20;
            font-size: clamp(1rem, 4vw, 1.18rem) !important;
            line-height: 1.72;
        }
        #ending-overlay .btn {
            background: #2c3e50 !important;
            color: #fdf5e6 !important;
            width: auto !important;
            min-height: 50px;
            border-radius: 6px !important;
            box-shadow: 0 5px 0 #182633 !important;
            margin: 24px auto 0;
        }
        .ending-stats {
            display: inline-block;
            margin-top: 18px;
            padding: 10px 14px;
            background: rgba(42,29,21,0.13);
            border: 1px solid rgba(42,29,21,0.48);
            color: #2a1d15;
            font-size: 0.98rem;
            font-weight: 800;
            line-height: 1.5;
            box-shadow: inset 0 0 12px rgba(224,219,204,0.42);
        }

        @keyframes pulseBar { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes dangerShake { 0% { transform: translateX(-1px); } 100% { transform: translateX(1px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity:0; } 100% { transform: scale(1); opacity:1; } }
        @keyframes bounceDot { 0% { transform: scale(1); } 100% { transform: scale(1.3); } }

        @media (max-height: 760px) {
            #game-screen { justify-content: flex-start; overflow-y: auto; }
            .stats-container { margin-bottom: 10px; }
            .inventory-container { margin-bottom: 10px; padding: 6px; }
            .game-area { height: 360px; min-height: 320px; margin-top: 12px; }
            .year-display { top: -42px; font-size: 1.9rem; }
            .card { padding: 18px; border-width: 5px; }
            .card-image { height: 110px; margin-bottom: 12px; font-size: 4rem; }
            .card-title { font-size: 1.18rem; margin-bottom: 8px; }
            .card-desc { font-size: 1rem; line-height: 1.42; }
            .controls { margin-top: 14px; }
            .btn { min-height: 54px; }
        }

        @media (max-width: 420px) {
            body { overflow-y: auto; }
            #game-screen { justify-content: flex-start; padding: 10px; overflow-y: auto; }
            .start-box { padding: 26px 18px; }
            .start-box h1 { font-size: 2rem !important; }
            .stat-icon { width: 44px; height: 44px; font-size: 1.28rem; }
            .stat-label { font-size: 0.72rem; }
            .item-slot { width: 40px; height: 40px; font-size: 1.55rem; }
            .game-area { width: min(310px, calc(100vw - 20px)); height: 380px; min-height: 340px; }
            .card { padding: 17px; border-width: 5px; }
            .card-image { height: 118px; font-size: 4.1rem; }
            .card-title { font-size: 1.15rem; }
            .card-desc { font-size: 0.98rem; line-height: 1.45; }
            .controls { width: min(310px, calc(100vw - 20px)); gap: 10px; }
            .btn { min-height: 58px; font-size: 0.88rem; padding: 9px; }
            .pop-card { width: min(320px, calc(100vw - 32px)); padding: 24px 18px; }
        }

    </style>
</head>
<body>

<div id="start-screen">
    <div class="start-box">
        <div style="font-size:4rem; margin-bottom:15px;">🇫🇷</div>
        <h1 style="font-family:'Cinzel'; font-size:2.5rem; margin:0; text-shadow:2px 2px 0 #c0392b;">RÉVOLUTION<br>1789-1799</h1>
        <p style="color:#ddd; font-style:italic;">"자유가 아니면 죽음을"</p>
        <div style="font-size:1.1rem; line-height:1.8; margin:30px 0; color:#ecf0f1; border-top:1px solid #777; border-bottom:1px solid #777; padding:20px 0;">
            당신은 혁명의 소용돌이 속에 선 <strong>프랑스 혁명 정부의 고위 관료</strong>입니다.<br>
            민중, 국고, 혁명 열기, 군사력<br>
            4가지 힘의 균형을 유지하며<br>
            <strong>1799년 나폴레옹 집권 전까지 생존하십시오.</strong>
        </div>
        <button class="start-btn" onclick="startGame()">혁명의 소용돌이로 (START)</button>
    </div>
</div>

<div id="game-screen">
    <div class="stats-container">
        <div class="stat-wrapper">
            <div class="stat-icon" id="icon-bread">
                <span class="emoji-layer">🥖</span><div class="stat-bar" id="fill-bread" style="height:50%"></div>
            </div>
            <div class="indicator-dot" id="dot-bread"></div>
            <div class="stat-label">민중</div>
        </div>
        <div class="stat-wrapper">
            <div class="stat-icon" id="icon-money">
                <span class="emoji-layer">💰</span><div class="stat-bar" id="fill-money" style="height:50%"></div>
            </div>
            <div class="indicator-dot" id="dot-money"></div>
            <div class="stat-label">국고</div>
        </div>
        <div class="stat-wrapper">
            <div class="stat-icon" id="icon-rev">
                <span class="emoji-layer">🔥</span><div class="stat-bar" id="fill-rev" style="height:50%"></div>
            </div>
            <div class="indicator-dot" id="dot-rev"></div>
            <div class="stat-label">혁명</div>
        </div>
        <div class="stat-wrapper">
            <div class="stat-icon" id="icon-army">
                <span class="emoji-layer">⚔️</span><div class="stat-bar" id="fill-army" style="height:50%"></div>
            </div>
            <div class="indicator-dot" id="dot-army"></div>
            <div class="stat-label">군사</div>
        </div>
    </div>

    <div class="inventory-container">
        <div class="item-slot" id="slot-0" onclick="showItemDesc(this)"></div>
        <div class="item-slot" id="slot-1" onclick="showItemDesc(this)"></div>
        <div class="item-slot" id="slot-2" onclick="showItemDesc(this)"></div>
    </div>

    <div class="game-area">
        <div class="year-display" id="year-display">1789</div>
        <div class="card" id="current-card">
            <div class="card-image" id="card-img">👑</div>
            <div id="npc-badge" class="npc-badge" style="display:none;">인물</div>
            <div class="card-title" id="card-speaker">Speaker</div>
            <div class="card-desc" id="card-text">Text</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-left" id="btn-left" 
            onmouseenter="previewEffect('left')" onmouseleave="clearPreview()"
            onclick="playerSwipe('left')">좌측 선택</button>
        <button class="btn btn-right" id="btn-right" 
            onmouseenter="previewEffect('right')" onmouseleave="clearPreview()"
            onclick="playerSwipe('right')">우측 선택</button>
    </div>
</div>

<div id="item-popup">
    <div class="pop-card">
        <div style="font-size:4rem; margin-bottom:10px;" id="popup-icon">🎁</div>
        <h2 style="margin:0 0 10px 0; color:var(--accent);" id="popup-title">아이템 획득!</h2>
        <p id="popup-desc" style="font-size:1rem; line-height:1.5;">설명</p>
        <button class="btn" style="background:#2c3e50; width:100%; margin-top:20px;" onclick="closePopup()">확인</button>
    </div>

        const sign = Math.sign(delta);
        const amount = Math.abs(delta);
        if(amount >= 30) return sign * 20;
        if(amount >= 25) return sign * 18;
        if(amount >= 20) return sign * 14;
        if(amount >= 15) return sign * 10;
        if(amount >= 10) return sign * 7;
        return delta;
    }

        let adjusted = getBalancedDelta(delta);

        { year: 1791, speaker: "마리 앙투아네트", img: "👸", isNpc: true, text: "여긴 위험해요. 오스트리아로 도망쳐요. [다이아몬드]를 챙기세요.", left: { text: "거절한다.", effect: { rev: -5, bread: 5 } }, right: { text: "받아두마.", effect: { rev: 8, bread: -10, getItem: 'diamond' } } },

        { year: 1792, speaker: "오스트리아", img: "👑", text: "왕을 복위시키지 않으면 전쟁이다!", left: { text: "굴복한다.", effect: { army: -20, rev: 15, bread: -10 } }, right: { text: "전쟁 선포!", effect: { army: 15, money: -25, rev: 5 } } },
        { year: 1792, speaker: "상 큘로트", img: "🔥", text: "왕이 적과 내통했다! 튈르리 궁전을 습격하자!", left: { text: "멈춰라! 이건 반역이다!", effect: { bread: -15, rev: -10, army: 5 } }, right: { text: "시민들이여, 무기를 들어라!", effect: { bread: 15, rev: 20, money: -8, army: -5 } } },
        { year: 1792, speaker: "발미 전투", img: "⚔️", text: "프로이센군이 파리 근교까지 왔습니다. 승산이 없습니다.", left: { text: "후퇴하라.", effect: { army: -30, rev: -20, bread: -10 } }, right: { text: "죽을 때까지 싸워라!", effect: { army: 20, rev: 10, bread: 5 } } },
        { year: 1792, speaker: "9월 학살", img: "🗡️", text: "감옥의 반혁명파가 외세와 내통한다는 소문이 퍼졌습니다. 군중이 처형을 요구합니다.", left: { text: "군중을 막아라.", effect: { bread: -12, rev: -8, army: -8 } }, right: { text: "눈감아라.", effect: { bread: 15, rev: 25, army: -10, money: -5 } } },
        
        { year: 1793, speaker: "루이 16세", img: "🩸", text: "국왕의 처분을 결정하십시오.", left: { text: "자비롭게 유배를...", effect: { rev: -15, bread: -8, money: -5 } }, right: { text: "단두대가 답이다!", effect: { rev: 25, bread: 8, army: -5 } } },
        { year: 1793, speaker: "국민공회", img: "📣", text: "전쟁이 커지고 있습니다. 국민 총동원령을 내려 병력과 물자를 모을까요?", left: { text: "징집을 늦춰라.", effect: { army: -18, rev: -8, bread: 5 } }, right: { text: "전 국민을 동원하라.", effect: { army: 25, money: -18, bread: 12, rev: 8 } } },

        { year: 1794, speaker: "로베스피에르", img: "⚖️", isNpc: true, text: "공화국의 적들을 모두 단두대로 보내야 합니다.", left: { text: "그만해!", effect: { rev: -20, army: -10 } }, right: { text: "동의한다.", effect: { rev: 30, bread: -5, money: -5 } } },
        { year: 1794, speaker: "테르미도르", img: "💀", text: "의회에서 로베스피에르를 체포하려 합니다.", left: { text: "보호하라!", effect: { rev: 20, army: -10 } }, right: { text: "체포해라!", effect: { rev: -30, bread: 10, army: 5 } } },
        
        { year: 1795, speaker: "나폴레옹", img: "💣", isNpc: true, text: "반란군 진압을 위해 대포가 필요합니다.", left: { text: "위험하다.", effect: { army: -10, bread: 5 } }, right: { text: "허가한다.", effect: { army: 20, rev: -10, bread: -8, getItem: 'cannon' } } },

        // 1799년 엔딩 분기
        { 
            year: 1799, speaker: "브뤼메르 18일", img: "🏛️",

            left: { text: "끝까지 저항한다!", effect: { ending: "RESISTANCE" } },

        }
    ];

    const VARIABLE_EVENT_SLOTS = [
        {
            afterSpeaker: "부녀자들의 행진",
            year: 1789,
            events: [
                { year: 1789, speaker: "파리 제빵사", img: "🥖", text: "빵값이 다시 오르고 있습니다. 제빵사들은 밀가루가 부족하다고 호소합니다.", left: { text: "가격 인상을 막아라.", effect: { bread: 10, money: -8, rev: 5 } }, right: { text: "시장에 맡겨라.", effect: { bread: -15, money: 5 } } },
                { year: 1789, speaker: "곡물 창고", img: "🌾", text: "곡물 창고를 열면 군중은 잠잠해지겠지만 국고 부담이 큽니다.", left: { text: "창고를 지켜라.", effect: { bread: -10, money: 6 } }, right: { text: "창고를 열어라.", effect: { bread: 15, money: -12 } } }
            ]
        },
        {

                { year: 1792, speaker: "공화국 선포", img: "🏛️", text: "왕정이 무너진 뒤 공화국 선포를 요구하는 목소리가 커집니다.", left: { text: "선포를 미뤄라.", effect: { rev: -10, bread: -8 } }, right: { text: "공화국을 선포하라.", effect: { rev: 14, bread: 8, money: -5 } } },

            ]
        },
        {

            events: [
                { year: 1793, speaker: "암시장 단속", img: "🕯️", text: "최고가격법 이후 물자가 숨어들고 있습니다. 암시장을 단속할까요?", left: { text: "눈감아라.", effect: { money: 8, bread: -10 } }, right: { text: "단속하라.", effect: { bread: 8, money: -8, rev: 5 } } },
                { year: 1793, speaker: "파리 코뮌 대표", img: "📣", text: "상퀼로트들이 더 강한 가격 통제와 배급을 요구합니다.", left: { text: "거절한다.", effect: { bread: -12, rev: -5 } }, right: { text: "요구를 받아들인다.", effect: { bread: 12, money: -10, rev: 8 } } }
            ]
        }
    ];

    let GAME_DECK = [];

    window.startGame = function() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        initGame();
    }

    function initGame() {
        buildDeck();
        updateStatsUI();
        updateInventoryUI();
        loadCard(0);
    }

    function buildDeck() {
        GAME_DECK = [];
        const slotBySpeaker = new Map(VARIABLE_EVENT_SLOTS.map(slot => [slot.afterSpeaker, slot]));
        HISTORICAL_DECK.forEach((histEvent, index) => {
            GAME_DECK.push(histEvent);
            const slot = slotBySpeaker.get(histEvent.speaker);
            if (slot && index < HISTORICAL_DECK.length - 1) {
                const sameYearEvents = slot.events.filter(evt => evt.year === slot.year);
                if(sameYearEvents.length === 0) return;
                const randomEvt = {...sameYearEvents[Math.floor(Math.random() * sameYearEvents.length)]};
                GAME_DECK.push(randomEvt);
            }
        });
    }

    function loadCard(idx) {
        if (idx >= GAME_DECK.length) return;
        const data = GAME_DECK[idx];
        STATE.year = data.year || STATE.year;
        document.getElementById('year-display').innerText = STATE.year || "???";
        document.getElementById('npc-badge').style.display = data.isNpc ? 'block' : 'none';
        document.getElementById('card-img').innerText = data.img;
        document.getElementById('card-speaker').innerText = data.speaker;
        document.getElementById('card-text').innerText = data.text;
        
        document.getElementById('btn-left').innerText = "◀ " + data.left.text;
        document.getElementById('btn-right').innerText = data.right.text + " ▶";

        const card = document.getElementById('current-card');
        card.style.transition = 'none'; 
        card.style.transform = 'translate(0, 0) rotate(0deg)';
        card.style.opacity = 1;
    }

    window.previewEffect = function(dir) {
        const data = GAME_DECK[STATE.deckIndex];
        const effect = (dir === 'left') ? data.left.effect : data.right.effect;
        for(let key in effect) {
            if(STATE.stats.hasOwnProperty(key)) {
                const dot = document.getElementById('dot-'+key);
                const amount = Math.abs(getEffectiveDelta(key, effect[key]));
                dot.classList.remove('dot-small', 'dot-large');
                if(amount < 10) dot.classList.add('dot-small');
                if(amount >= 20) dot.classList.add('dot-large');
                dot.style.display = 'block';
            }
        }
    };

    window.clearPreview = function() {
        document.querySelectorAll('.indicator-dot').forEach(dot => {
            dot.style.display = 'none';
            dot.classList.remove('dot-small', 'dot-large');
        });
    };

    window.playerSwipe = function(direction) {
        clearPreview();
        const card = document.getElementById('current-card');
        const data = GAME_DECK[STATE.deckIndex];
        const choice = direction === 'left' ? data.left : data.right;

        card.style.transition = 'transform 0.3s ease-in, opacity 0.3s ease-in';
        if (direction === 'left') {
            card.classList.add('swipe-left');
        } else {
            card.classList.add('swipe-right');
        }

        setTimeout(() => {
            card.classList.remove('swipe-left', 'swipe-right');
            applyEffect(choice.effect);
            STATE.deckIndex++;
            loadCard(STATE.deckIndex);
        }, 300);
    };

    function applyEffect(effect) {
        if(effect.getItem) addItem(effect.getItem);
        
        if(effect.ending) { 
            triggerEnding(effect.ending); 
            return; 
        }

        let passiveTriggered = false;
        let passiveMsg = "";

        for (let key in effect) {
            if (STATE.stats.hasOwnProperty(key)) {
                let delta = getEffectiveDelta(key, effect[key]);
                if (key === 'army' && effect[key] > 0 && hasItem('cannon')) { passiveTriggered = true; passiveMsg = "💣 대포가 군사력을 증폭!"; }
                STATE.stats[key] += delta;
            }
        }
        
        if (hasItem('contract') && STATE.stats.rev > 80) {
            STATE.stats.rev = 80; passiveTriggered = true; passiveMsg = "📜 인간과 시민의 권리 선언이 공포정치를 억제!";
        }

        if(passiveTriggered) showPassive(passiveMsg);
        checkGameOver();
        updateStatsUI();
    }

    function checkGameOver() {
        const s = STATE.stats;
        let deadReason = null; let deadDesc = ""; let savedByItem = null;

        if (s.bread <= 20 && hasItem('bread')) {
            useItem('bread'); s.bread += 40;
            showPopup("🥖 비상 식량 사용!", "민중이 등을 돌리자 식량을 풀어 거리를 달랬습니다 (+40)", "🥖");
            updateStatsUI(); return; 
        }
        if (s.money <= 20 && hasItem('diamond')) {
            useItem('diamond'); s.money += 35; s.rev += 5;
            showPopup("💎 왕비의 다이아몬드 사용!", "왕실의 비밀 자금으로 파산을 잠시 피했습니다. 그러나 의심도 커졌습니다. (국고 +35, 혁명 열기 +5)", "💎");
            updateStatsUI(); return;
        }

        if (s.bread <= BALANCE.gameOverLow) { deadReason = "민중 봉기"; deadDesc = "빵과 신뢰를 잃은 군중이 거리로 쏟아져 나왔습니다. 혁명 정부의 이름은 더 이상 그들을 설득하지 못했습니다."; }
        else if (s.money <= BALANCE.gameOverLow) { deadReason = "국가 파산"; deadDesc = "세금을 걷을 행정도, 전쟁을 버틸 자금도 남지 않았습니다. 혁명 정부는 재정 붕괴 속에서 무너졌습니다."; }
        else if (s.rev <= BALANCE.gameOverLow) { deadReason = "왕정복고"; deadDesc = "혁명의 명분이 꺼지자 왕당파와 보수 세력이 다시 힘을 얻었습니다. 공화국은 제도도 기억도 되기 전에 밀려났습니다."; }
        else if (s.army <= BALANCE.gameOverLow) { deadReason = "외세 점령"; deadDesc = "전선을 지킬 군대가 무너지자 반혁명 전쟁의 압력이 파리까지 밀려왔습니다. 혁명은 외부의 군홧발 아래 꺾였습니다."; }
        else if (s.bread >= BALANCE.gameOverHigh) { deadReason = "거리의 정치"; deadDesc = "민중의 요구와 거리의 동원이 의회를 압도했습니다. 정부는 여론을 달래느라 어떤 결정도 오래 유지하지 못했습니다."; }
        else if (s.money >= BALANCE.gameOverHigh) { deadReason = "재정 독점"; deadDesc = "국고는 찼지만 그 과정에서 세금, 몰수, 특권이 권력의 도구가 되었습니다. 당신은 혁명을 배신한 관료로 몰렸습니다."; }
        else if (s.rev >= BALANCE.gameOverHigh) { deadReason = "공포정치"; deadDesc = "순수한 혁명을 지킨다는 명분이 의심과 숙청으로 번졌습니다. 단두대는 적뿐 아니라 혁명가 자신에게도 향했습니다."; }
        else if (s.army >= BALANCE.gameOverHigh) { deadReason = "군사독재"; deadDesc = "공화국을 지킨다는 명분으로 군대가 정치를 장악했습니다. 혁명의 균형은 총검 앞에서 사라졌습니다."; }

        if (deadReason) triggerEnding(deadReason, deadDesc);
    }

    function hasItem(key) { return STATE.items.includes(key); }
    function addItem(itemKey) {
        if(STATE.items.length >= 3 || STATE.items.includes(itemKey)) return;
        STATE.items.push(itemKey);
        updateInventoryUI();
        const item = ITEMS[itemKey];
        showPopup(item.name + " 획득!", item.desc, item.icon);
    }
    function useItem(key) {
        const idx = STATE.items.indexOf(key);
        if(idx > -1) { STATE.items.splice(idx, 1); updateInventoryUI(); }
    }
    function showPopup(title, desc, icon="🎁") {
        document.getElementById('popup-icon').innerText = icon;
        document.getElementById('popup-title').innerText = title;
        document.getElementById('popup-desc').innerText = desc;
        document.getElementById('item-popup').style.display = 'flex';
    }
    function showPassive(msg) {
        const p = document.getElementById('passive-popup');
        document.getElementById('passive-desc').innerText = msg;
        p.style.display = 'flex';
        setTimeout(() => { p.style.display = 'none'; }, 1100);
    }
    window.closePopup = function() { document.getElementById('item-popup').style.display = 'none'; }
    
    // [중요 수정] 아이템 내용 표시: 이름 + 설명 포함
    window.showItemDesc = function(slotElement) {
        const tooltipText = slotElement.getAttribute('data-tooltip');
        // 툴팁 텍스트에서 아이템 이름을 파싱 (줄바꿈 앞부분만)
        const itemName = tooltipText.split('\n')[0];
        
        if (itemName && itemName !== "비어있음") {
            let itemKey = null;
            for(let key in ITEMS) {
                if(ITEMS[key].name === itemName) { itemKey = key; break; }
            }
            if(itemKey) {
                const item = ITEMS[itemKey];
                showPopup(item.name, item.desc, item.icon);
            }
        }
    }

    // [중요 수정] 인벤토리 UI 업데이트 시 설명도 데이터에 포함
    function updateInventoryUI() {
        for(let i=0; i<3; i++) {
            const slot = document.getElementById('slot-'+i);
            const itemKey = STATE.items[i];
            if(itemKey) {
                const item = ITEMS[itemKey];
                slot.innerText = item.icon;
                slot.classList.add('active');
                // 툴팁에 이름과 설명 같이 넣음 (줄바꿈으로 구분)
                slot.setAttribute('data-tooltip', item.name + "\n" + item.desc);
            } else {
                slot.innerText = "";
                slot.classList.remove('active');
                slot.setAttribute('data-tooltip', "비어있음");
            }
        }
    }

    function getEndingStatsSummary() {
        const s = STATE.stats;
        return `<br><span class="ending-stats">최종 균형: 민중 ${Math.round(s.bread)} · 국고 ${Math.round(s.money)} · 혁명 ${Math.round(s.rev)} · 군사 ${Math.round(s.army)}</span>`;
    }

    function triggerEnding(type, desc) {
        const overlay = document.getElementById('ending-overlay');
        const rEl = document.getElementById('end-reason');
        const iEl = document.getElementById('end-icon');
        const dEl = document.getElementById('end-desc');

        const endingMeta = {
            "민중 봉기": { icon: "🔥", color: "#e74c3c" },
            "국가 파산": { icon: "💰", color: "#d35400" },
            "왕정복고": { icon: "👑", color: "#8e44ad" },
            "외세 점령": { icon: "⚔️", color: "#c0392b" },
            "거리의 정치": { icon: "📣", color: "#e67e22" },
            "재정 독점": { icon: "🏦", color: "#d4ac0d" },
            "공포정치": { icon: "⚖️", color: "#c0392b" },
            "군사독재": { icon: "🪖", color: "#7f8c8d" }
        };

        if(type === "SURVIVAL") {
            rEl.style.color = "#d4ac0d";
            iEl.innerText = "🦅";
            rEl.innerText = "브뤼메르의 생존자";
            dEl.innerHTML = "당신은 살아남았습니다.<br>그러나 혁명은 시민과 의회의 손에서<br>군대와 영웅의 이름 아래로 넘어갔습니다." + getEndingStatsSummary();
        } 
        else if(type === "RESISTANCE") {
            rEl.style.color = "#3498db"; 
            iEl.innerText = "🏛️";
            rEl.innerText = "공화정의 마지막 관료";
            dEl.innerHTML = "당신은 총칼 앞에서도 굴복하지 않았습니다.<br>쿠데타는 막지 못했지만,<br>공화국을 지키려 한 기록은 남았습니다." + getEndingStatsSummary();
        }
        else {
            const meta = endingMeta[type] || { icon: "💀", color: "#c0392b" };
            rEl.style.color = meta.color;
            iEl.innerText = meta.icon;
            rEl.innerText = type; 
            dEl.innerHTML = desc + getEndingStatsSummary();
        }
        overlay.style.display = 'flex';
    }

    function updateStatsUI() { setBar('bread', STATE.stats.bread); setBar('money', STATE.stats.money); setBar('rev', STATE.stats.rev); setBar('army', STATE.stats.army); }
    function setBar(id, val) {
        const rawVal = val;
        const displayVal = Math.max(0, Math.min(100, rawVal));
        document.getElementById('fill-'+id).style.height = displayVal + '%';
        const wrapper = document.getElementById('icon-'+id).parentElement;
        wrapper.classList.remove('stat-danger', 'stat-critical');
        if(rawVal <= BALANCE.dangerLow || rawVal >= BALANCE.dangerHigh) wrapper.classList.add('stat-danger');
        if(rawVal <= BALANCE.criticalLow || rawVal >= BALANCE.criticalHigh) wrapper.classList.add('stat-critical');
    }

</script>
</body>
