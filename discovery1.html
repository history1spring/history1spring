                                <PixelPort active={port.id === currentLocation} />
                                <div className="mt-1 bg-[#f4e4bc] px-1.5 py-0.5 rounded text-[7px] sm:text-[8px] font-bold text-[#5c3a21] border border-[#8b5e3c] shadow-md opacity-80 group-hover/port:opacity-100 transition-opacity whitespace-nowrap z-50">
                                    {port.name}
                                </div>
                            </div>
                        </div>
                    ))}
                    {Object.values(PORTS).map(port => {
                        if (port.id === currentLocation) return (
                            <div key={'ship'} className="absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-1000 z-20" style={{ left: `${port.x}%`, top: `${port.y}%` }}>
                                <div className="relative">
                                    <div className="animate-bounce-slow"><PixelShip /></div>
                                    <div className="absolute -bottom-6 left-1/2 transform -translate-x-1/2 text-[10px] font-bold text-[#f4e4bc] whitespace-nowrap bg-[#3e2b20] px-2 py-0.5 rounded border border-[#8b5e3c] shadow-lg">현재</div>
                                </div>
                            </div>
                        );
                        return null;
                    })}
                </div>
            );
        };

        const Modal = ({ title, children, onClose }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-2 sm:p-4">
                <div className="bg-[#f4e4bc] w-full max-w-lg max-h-[92vh] overflow-y-auto rounded-sm border-[5px] sm:border-[8px] border-[#5c3a21] shadow-[0_0_50px_rgba(0,0,0,0.5)] relative animate-scale-in" style={{ backgroundImage: "url('https://www.transparenttextures.com/patterns/aged-paper.png')" }}>
                    <div className="bg-[#3e2b20] text-[#eecfa1] p-3 sm:p-4 text-center font-bold text-lg sm:text-xl border-b-4 border-[#2a1d15] shadow-md sticky top-0 z-10">
                        <span className="relative z-10 drop-shadow-md">{title}</span>
                    </div>
                    <div className="p-4 sm:p-8 text-[#3e2b20] font-serif leading-relaxed">{children}</div>
                    {onClose && (
                        <div className="p-4 border-t-2 border-[#d4b483]/50 flex justify-center bg-[#e8d5a5]/30">
                            <button onClick={onClose} className="px-8 py-2 bg-[#8b4513] text-[#f4e4bc] rounded-sm hover:bg-[#6d3710] transition-colors font-bold shadow-md border border-[#a0522d]">확인</button>
                        </div>
                    )}
                </div>
            </div>
        );

        function HistoryTradeGame() {
            // 화면 분기를 위한 상태 추가 ('start' 또는 'playing')
            const [currentScreen, setCurrentScreen] = useState('start');
            
            const [gameState, setGameState] = useState(INITIAL_STATE);
            const [activeModal, setActiveModal] = useState(null); 
            const [selectedGood, setSelectedGood] = useState(null);
            const [currentQuiz, setCurrentQuiz] = useState(null);
            const [pendingDestination, setPendingDestination] = useState(null);
            const [quizResultInfo, setQuizResultInfo] = useState(null); 
            const [voyageDays, setVoyageDays] = useState(0); 

            const currentPort = PORTS[gameState.location];
            const upgradeCost = Math.floor(gameState.cargoSpace * 20);

            useEffect(() => {
                if (!gameState.gameOver) {
                    if (gameState.day > MAX_DAYS || gameState.gold < 0) {
                        setGameState(prev => ({ ...prev, gameOver: true }));
                    }
                }
            }, [gameState.day, gameState.gold]);

            const handleTrade = (goodKey, isBuying) => {
                const price = isBuying ? getBuyPrice(goodKey) : getSellPrice(goodKey);
                const currentQty = gameState.inventory[goodKey];
                const currentAvg = gameState.avgCost[goodKey];
                
                if (isBuying) {
                    if (gameState.gold >= price && getTotalCargo() < gameState.cargoSpace) {
                        const newAvg = Math.floor(((currentQty * currentAvg) + price) / (currentQty + 1));
                        setGameState(prev => ({
                            ...prev,
                            gold: prev.gold - price,
                            inventory: { ...prev.inventory, [goodKey]: currentQty + 1 },
                            avgCost: { ...prev.avgCost, [goodKey]: newAvg }
                        }));
                    }
                } else {
                    if (currentQty > 0) {
                        const remainingAvg = currentQty - 1 === 0 ? 0 : currentAvg;
                        setGameState(prev => ({
                            ...prev,
                            gold: prev.gold + price,
                            inventory: { ...prev.inventory, [goodKey]: currentQty - 1 },
                            avgCost: { ...prev.avgCost, [goodKey]: remainingAvg }
                        }));
                    }
                }
            };

            const getMaxBuyQty = (goodKey) => {
                if (!canBuyHere(goodKey) || gameState.gameOver) return 0;
                const price = getBuyPrice(goodKey);
                const emptySpace = gameState.cargoSpace - getTotalCargo();
                if (price <= 0 || emptySpace <= 0) return 0;
                return Math.min(emptySpace, Math.floor(gameState.gold / price));
            };

            const handleBuyMax = (goodKey) => {
                const qtyToBuy = getMaxBuyQty(goodKey);
                if (qtyToBuy <= 0) return;

                setGameState(prev => {
                    const origin = GOODS_INFO[goodKey]?.origin;
                    const canBuyAtPort = origin === 'any' || origin?.includes(prev.location);
                    if (!canBuyAtPort) return prev;

                    const price = PORTS[prev.location]?.market?.[goodKey] || 0;
                    if (price <= 0) return prev;

                    const emptySpace = prev.cargoSpace - Object.values(prev.inventory).reduce((a, b) => a + b, 0);
                    const safeQty = Math.min(qtyToBuy, emptySpace, Math.floor(prev.gold / price));
                    if (safeQty <= 0) return prev;

                    const currentQty = prev.inventory[goodKey];
                    const currentAvg = prev.avgCost[goodKey];
                    const newQty = currentQty + safeQty;
                    const newAvg = Math.floor(((currentQty * currentAvg) + (price * safeQty)) / newQty);

                    return {
                        ...prev,
                        gold: prev.gold - (price * safeQty),
                        inventory: { ...prev.inventory, [goodKey]: newQty },
                        avgCost: { ...prev.avgCost, [goodKey]: newAvg }
                    };
                });
            };

            const handleSellAll = () => {
                setGameState(prev => {
                    const saleValue = Object.entries(prev.inventory).reduce((sum, [goodKey, qty]) => {
                        return sum + (getSellPrice(goodKey) * qty);
                    }, 0);

                    if (saleValue <= 0) return prev;

                    const emptyInventory = Object.keys(prev.inventory).reduce((acc, goodKey) => {
                        acc[goodKey] = 0;
                        return acc;
                    }, {});
                    const emptyAvgCost = Object.keys(prev.avgCost).reduce((acc, goodKey) => {
                        acc[goodKey] = 0;
                        return acc;
                    }, {});

                    return {
                        ...prev,
                        gold: prev.gold + saleValue,
                        inventory: emptyInventory,
                        avgCost: emptyAvgCost
                    };
                });
            };

            const handleUpgradeCargo = () => {
                if (gameState.gold >= upgradeCost) {
                    setGameState(prev => ({
                        ...prev,
                        gold: prev.gold - upgradeCost,
                        cargoSpace: prev.cargoSpace + 5
                    }));
                }
            };

            const getTotalCargo = () => Object.values(gameState.inventory).reduce((a, b) => a + b, 0);
            const getBulkSaleValue = () => Object.entries(gameState.inventory).reduce((sum, [goodKey, qty]) => {
                return sum + (getSellPrice(goodKey) * qty);
            }, 0);

            const isCommonGood = (good) => COMMON_GOODS.includes(good);

            const getOrigins = (good) => {
                const origin = GOODS_INFO[good]?.origin;
                if (!origin) return [];
                return origin === 'any' ? Object.keys(PORTS) : origin;
            };

            const getNearestOrigin = (good, portId = gameState.location) => {
                const target = PORTS[portId];
                if (!target) return null;
                return getOrigins(good).reduce((nearest, originId) => {
                    const origin = PORTS[originId];
                    if (!origin) return nearest;
                    const distance = Math.hypot(target.x - origin.x, target.y - origin.y);
                    if (!nearest || distance < nearest.distance) return { id: originId, distance };
                    return nearest;
                }, null);
            };

            const getBuyPrice = (good) => currentPort?.market?.[good] || 0;

            const canBuyHere = (good) => {
                const origin = GOODS_INFO[good]?.origin;
                if (!origin) return false;
                return origin === 'any' || origin.includes(gameState.location);
            };

            const getOriginLabel = (good) => {
                const origin = GOODS_INFO[good]?.origin;
                if (!origin) return "정보 없음";
                if (origin === 'any') return "공용";

                const firstOrigin = origin[0];
                if (firstOrigin === 'lisbon') return '리스본';
                if (firstOrigin === 'sevilla') return '세비야';
                if (firstOrigin === 'venice') return '베네치아';
                if (firstOrigin === 'cape_town') return '케이프';
                if (firstOrigin === 'calicut') return '캘리컷';
                if (firstOrigin === 'malacca') return '말라카';
                return PORTS[firstOrigin]?.name || firstOrigin;
            };

            const getSellPrice = (good, portId = gameState.location) => {
                const basePrice = PORTS[portId]?.market?.[good] || 0;
                if (isCommonGood(good)) return Math.max(1, Math.floor(basePrice * SELL_SPREAD));

                const nearestOrigin = getNearestOrigin(good, portId);
                if (!nearestOrigin) return Math.max(1, Math.floor(basePrice * SELL_SPREAD));
                const isAtOrigin = nearestOrigin.id === portId;
                const distancePremium = Math.floor(nearestOrigin.distance * 1.15);
                const demandBonus = DEMAND_BONUS[good]?.[portId] || 0;
                const originPenalty = isAtOrigin ? Math.max(12, Math.floor(basePrice * 0.6)) : 0;

                return Math.max(1, Math.floor((basePrice * SELL_SPREAD) + distancePremium + demandBonus - originPenalty));
            };

            const getMarketNote = (good) => {
                if (isCommonGood(good)) return "공용품: 매매 차익 낮음";
                const nearestOrigin = getNearestOrigin(good);
                if (!nearestOrigin) return "시세 정보 없음";
                if (nearestOrigin.id === gameState.location) return "산지: 되팔면 손해";
                if ((DEMAND_BONUS[good]?.[gameState.location] || 0) > 10) return "수요 높음";
                return "거리 보너스 반영";
            };

            const calculateDays = (targetId) => {
                const current = PORTS[gameState.location];
                const target = PORTS[targetId];
                const dx = current.x - target.x;
                const dy = current.y - target.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return Math.ceil(5 + distance / 2.5); 
            };

            const startVoyage = (destId) => {
                if (gameState.gameOver) return;
                setPendingDestination(destId);
                setVoyageDays(calculateDays(destId)); 
                
                // 랜덤으로 문제를 뽑되, 선택지 셔플을 위해 원본을 복사 후 셔플 로직 적용
                const randomQuizIndex = Math.floor(Math.random() * QUIZZES.length);
                const rawQuiz = QUIZZES[randomQuizIndex];
                
                // 선택지 셔플 로직
                // 1. 현재 정답 텍스트 저장
                const correctAnswerText = rawQuiz.options[rawQuiz.answer];
                
                // 2. 옵션 배열 복사 및 셔플
                const shuffledOptions = [...rawQuiz.options];
                for (let i = shuffledOptions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
                }
                
                // 3. 섞인 배열에서 정답의 새로운 인덱스 찾기
                const newAnswerIndex = shuffledOptions.indexOf(correctAnswerText);
                
                setCurrentQuiz({
                    ...rawQuiz,
                    options: shuffledOptions,
                    answer: newAnswerIndex
                });
                setActiveModal('quiz');
            };

            const handleQuizResult = (isCorrect) => {
                let message = "";
                let newGameState = { ...gameState };
                let eventHappened = null;
                const daysNeeded = voyageDays; 

                if (isCorrect) {
                    newGameState.location = pendingDestination;
                    newGameState.day += daysNeeded; 
                    newGameState.gold -= 30; 
                    newGameState.unlockedFacts = [...new Set([...newGameState.unlockedFacts, currentQuiz.fact])];
                    message = `항해 성공! ${daysNeeded}일 만에 도착했습니다.`;

                    if (Math.random() < 0.4) {
                        const event = GOOD_EVENTS[Math.floor(Math.random() * GOOD_EVENTS.length)];
                        newGameState = event.effect(newGameState);
                        eventHappened = { ...event, type: 'good' };
                    }
                } else {
                    const penaltyDays = Math.ceil(daysNeeded * 1.5);
                    newGameState.day += penaltyDays;
                    newGameState.gold -= 50; 
                    message = `항로를 잃고 표류하다 ${penaltyDays}일 만에 회항했습니다.`;
                    
                    if (Math.random() < 0.3) {
                        const event = BAD_EVENTS[Math.floor(Math.random() * BAD_EVENTS.length)];
                        newGameState = event.effect(newGameState);
                        eventHappened = { ...event, type: 'bad' };
                    }
                }

                setGameState(newGameState);
                setQuizResultInfo({ success: isCorrect, text: message, fact: currentQuiz.fact, event: eventHappened });
                setActiveModal('result');
                setCurrentQuiz(null);
            };

            const getRank = () => {
                if (gameState.gold >= 20000) return "전설의 무역왕";
                if (gameState.gold >= 10000) return "대부호";
                if (gameState.gold >= 5000) return "숙련된 선장";
                if (gameState.gold >= 2000) return "평범한 상인";
                return "초보 뱃사람";
            };

            const getProfit = (good, price) => {
                const avg = gameState.avgCost[good];
                if (avg === 0) return 0;
                return price - avg;
            };

            // === 게임 시작 (인덱스) 화면 렌더링 ===
            if (currentScreen === 'start') {
                return (
                    <div className="min-h-screen w-full flex flex-col items-center justify-center p-3 sm:p-4 bg-[#0c0a09] overflow-y-auto overflow-x-hidden select-none font-serif text-[#eecfa1] relative">
                        {/* 배경 파도 효과 */}
                        <div className="absolute inset-0 ocean-waves opacity-20 pointer-events-none"></div>

                        <div className="w-full max-w-2xl bg-[#f4e4bc] rounded-lg border-[5px] sm:border-[8px] border-[#5c3a21] shadow-[0_0_50px_rgba(0,0,0,0.5)] p-4 sm:p-8 relative animate-scale-in text-[#3e2b20] z-10 my-6" style={{ backgroundImage: "url('https://www.transparenttextures.com/patterns/aged-paper.png')" }}>
                            
                            {/* 게임 타이틀 영역 */}
                            <div className="text-center mb-5 sm:mb-8">
                                <Anchor className="w-12 h-12 sm:w-16 sm:h-16 mx-auto text-[#8b4513] mb-3 sm:mb-4 drop-shadow-md animate-bounce-slow" />
                                <h1 className="text-3xl sm:text-5xl font-extrabold mb-3 text-[#3e2b20] drop-shadow-sm tracking-tight leading-tight">거상 : 신항로개척</h1>
                                <p className="text-sm sm:text-lg text-[#8b5e3c] font-bold tracking-widest">미지의 바다, 거대한 부를 향한 출항</p>
                            </div>

                            {/* 게임 설명 영역 */}
                            <div className="space-y-4 sm:space-y-6 mb-6 sm:mb-8 bg-[#fff8e1]/80 p-4 sm:p-6 rounded border border-[#d4b483] shadow-inner">
                                <section>
                                    <h2 className="text-lg sm:text-xl font-bold text-[#8b4513] flex items-center gap-2 mb-3 border-b border-[#d4b483] pb-2"><Ship className="w-5 h-5"/> 게임 소개</h2>
                                    <p className="text-sm sm:text-base leading-relaxed font-bold text-[#5c4033]">신항로 개척 시대. 당신은 한 척의 배를 이끄는 상인이 되어 전 세계의 항구를 누비며 무역을 해야 합니다. 제한된 200일 동안 최고의 거상(巨商)이 되는 것이 목표입니다.</p>
                                </section>

                                <section>
                                    <h2 className="text-lg sm:text-xl font-bold text-[#8b4513] flex items-center gap-2 mb-3 border-b border-[#d4b483] pb-2"><Compass className="w-5 h-5"/> 게임 방법</h2>
                                    <ul className="list-disc pl-5 space-y-2 text-sm sm:text-base font-bold leading-relaxed text-[#5c4033]">
                                        <li><span className="text-[#c62828]">특산물은 지정된 원산지에서만 구매</span>할 수 있으며, 멀리 떨어진 수요지에 팔수록 큰 이윤을 남깁니다.</li>
                                        <li>지도에서 목적지를 선택해 항해를 시작하세요. 거리에 따라 일수가 소모됩니다.</li>
                                        <li>항해 하려면 <span className="text-[#2e7d32]">역사 퀴즈</span>를 풀어야 합니다. 정답을 맞히면 무사히 도착하고, 틀리면 이동할 수 없습니다.</li>
                                        <li>수익으로 배를 <span className="text-[#8b4513]">증축</span>하여 더 많은 화물을 싣고 부를 축적하세요!</li>
                                    </ul>
                                </section>
                            </div>

                            {/* 시작 버튼 */}
                            <div className="flex justify-center">
                                <button 
                                    onClick={() => setCurrentScreen('playing')}
                                    className="group relative w-full sm:w-auto px-8 sm:px-12 py-3 sm:py-4 bg-[#2e7d32] text-[#f4e4bc] text-xl sm:text-2xl font-bold rounded-sm hover:bg-[#1b5e20] transition-all shadow-lg border-b-4 border-[#1b5e20] active:border-b-0 active:translate-y-1 overflow-hidden"
                                >
                                    <span className="relative z-10 flex items-center gap-2">게임 시작하기 <ArrowRight className="w-6 h-6 group-hover:translate-x-1 transition-transform" /></span>
                                </button>
                            </div>
                        </div>
                        
                        {/* 하단 크레딧 */}
                        <div className="static sm:absolute sm:bottom-4 mt-2 text-[#eecfa1] text-[10px] font-serif tracking-widest opacity-40">제작: 손서율</div>
                    </div>
                );
            }

            // === 메인 게임 화면 렌더링 ===
            return (
                <div className="min-h-screen lg:h-screen w-full flex flex-col items-center p-2 sm:p-4 bg-[#0c0a09] overflow-y-auto lg:overflow-hidden overflow-x-hidden select-none font-serif text-[#eecfa1]">
                    {/* 상단바 */}
                    <div className="w-full max-w-5xl bg-[#3e2b20] border-b-[4px] sm:border-b-[6px] border-[#2a1d15] p-3 flex flex-col sm:flex-row gap-3 sm:gap-4 justify-between items-stretch sm:items-center shadow-lg rounded-t-xl z-10 relative overflow-hidden shrink-0">
                        <div className="absolute inset-0 opacity-10" style={{backgroundImage: "url('https://www.transparenttextures.com/patterns/wood-pattern.png')"}}></div>
                        <div className="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-6 relative z-10 min-w-0">
                            <div className="flex flex-col min-w-0">
                                <span className="text-[10px] text-[#d4a065] font-bold tracking-widest mb-1">현재 항구</span>
                                <div className="text-xl sm:text-2xl font-bold text-[#f4e4bc] flex items-center gap-2 drop-shadow-md min-w-0">
                                    <Anchor className="w-5 h-5 text-[#d4a065] shrink-0" /> <span className="truncate">{currentPort.name}</span> <span className="text-xs sm:text-sm text-[#8b5e3c] ml-1 shrink-0">({currentPort.continent})</span>
                                </div>
                            </div>
                            <div className="hidden sm:block h-10 w-[2px] bg-[#2a1d15]/50 border-r border-[#5c3a21]"></div>
                            <div className="grid grid-cols-2 gap-2 sm:flex sm:gap-6">
                                <div className="flex flex-col items-start min-w-0 sm:min-w-[120px]">
                                    <span className="text-xs font-bold text-[#8b5e3c] tracking-widest mb-1">자금</span>
                                    <div className="flex items-center gap-2 bg-[#2a1d15]/80 px-3 sm:px-4 py-2 rounded-sm border border-[#5c3a21] shadow-inner w-full min-w-0">
                                        <Coins className="text-slate-300 w-5 h-5 shrink-0" /> 
                                        <span className={`font-bold text-lg sm:text-2xl truncate ${gameState.gold < 200 ? 'text-red-500 animate-pulse' : 'text-[#eecfa1]'}`}>{gameState.gold} 은</span>
                                    </div>
                                </div>
                                <div className="flex flex-col items-start min-w-0 sm:min-w-[120px]">
                                    <span className="text-xs font-bold text-[#8b5e3c] tracking-widest mb-1">항해일</span>
                                    <div className="flex items-center gap-2 bg-[#2a1d15]/80 px-3 sm:px-4 py-2 rounded-sm border border-[#5c3a21] shadow-inner w-full min-w-0">
                                        <Clock className={`w-5 h-5 shrink-0 ${gameState.day > MAX_DAYS - 20 ? 'text-red-500 animate-pulse' : 'text-blue-400'}`} /> 
                                        <span className="text-[#eecfa1] font-bold text-lg sm:text-2xl truncate">{Math.min(gameState.day, MAX_DAYS)} / {MAX_DAYS}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button onClick={() => setActiveModal('journal')} className="relative z-10 flex items-center justify-center gap-2 bg-[#5c3a21] px-4 sm:px-5 py-2 rounded-sm hover:bg-[#6d4c41] transition-all border-b-4 border-[#3e2b20] active:border-b-0 active:translate-y-1 shadow-lg group">
                            <BookOpen className="w-4 h-4 text-[#d4a065] group-hover:text-white" /> <span className="font-bold text-[#f4e4bc]">탐험 일지</span>
                        </button>
                    </div>

                    {/* 메인 게임 영역 (flex-1로 남은 공간 채움) */}
                    <div className="w-full lg:flex-1 max-w-5xl bg-[#e8d5a5] text-[#3e2b20] relative shadow-2xl overflow-visible lg:overflow-hidden flex flex-col lg:flex-row border-x-4 border-b-4 border-[#2a1d15] rounded-b-xl min-h-0" style={{backgroundImage: "url('https://www.transparenttextures.com/patterns/aged-paper.png')"}}>
                        
                        {/* 왼쪽: 거래소 */}
                        <div className="flex-1 p-3 sm:p-5 lg:p-6 lg:border-r border-[#8b5e3c]/30 relative z-10 flex flex-col h-auto min-h-[460px] lg:h-full overflow-visible lg:overflow-hidden">
                            <h2 className="text-xl sm:text-2xl font-bold mb-2 flex flex-wrap items-center gap-2 sm:gap-3 text-[#3e2b20] border-b-2 border-[#8b5e3c] pb-2 shrink-0">
                                <MapIcon className="w-6 h-6 text-[#8b4513]" /> {currentPort.name} 거래소 <span className="text-sm text-[#8b5e3c] font-normal mt-1">({currentPort.continent})</span>
                            </h2>
                            <p className="text-sm italic text-[#5c4033] mb-4 bg-[#fff8e1]/50 p-2 rounded border border-[#d4b483] shrink-0">"{currentPort.desc}"</p>
                            
                            {/* 거래 리스트 (flex-1로 남은 높이 차지 및 스크롤) */}
                            <div className="bg-white/40 p-2 rounded-lg shadow-sm border border-[#d4b483] flex-1 overflow-y-visible sm:overflow-y-auto no-scrollbar flex flex-col min-h-0">
                                <div className="hidden sm:grid grid-cols-[2fr_1fr_2fr] text-xs font-bold text-[#8b5e3c] border-b border-[#8b5e3c] pb-1 mb-2 px-2 sticky top-0 bg-[#fff8e1]/90 z-10">
                                    <span>상품 (시세)</span>
                                    <span className="text-center">보유/평단가</span>
                                    <span className="text-right">거래</span>
                                </div>
                                
                                <div className="space-y-1.5 pb-2">
                                {Object.keys(GOODS_INFO).map((good) => {
                                    const buyPrice = getBuyPrice(good);
                                    const sellPrice = getSellPrice(good);
                                    const profit = getProfit(good, sellPrice);
                                    const isOrigin = canBuyHere(good);
                                    
                                    return (
                                        <div key={good} className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 group p-2 sm:p-1.5 hover:bg-[#fff8e1] rounded transition-colors border-b border-dashed border-[#8b5e3c]/30 last:border-0">
                                            <div className="flex items-center gap-2 flex-1 min-w-0" onClick={() => {setSelectedGood(good); setActiveModal('goodInfo');}}>
                                                <div className="p-1 bg-[#f4e4bc] rounded-sm border border-[#8b5e3c] shadow-sm cursor-pointer hover:scale-110 transition-transform">
                                                    <PixelItemIcon type={good} />
                                                </div>
                                                <div className="min-w-0">
                                                    <div className="font-bold text-[#3e2b20] text-sm cursor-pointer hover:underline decoration-[#8b4513]">{GOODS_INFO[good].name}</div>
                                                    <div className="text-xs font-bold text-[#8b5e3c]">
                                                        {isOrigin ? `구매 ${buyPrice} 은` : '구매 불가'}
                                                    </div>
                                                    <div className="text-[9px] text-[#8b5e3c] opacity-80">{getMarketNote(good)}</div>
                                                </div>
                                            </div>
                                            
                                            <div className="flex sm:flex-col items-center justify-between sm:justify-center gap-2 sm:gap-0 w-full sm:w-20">
                                                <span className="sm:hidden text-[10px] text-[#8b5e3c] font-bold">보유/평단</span>
                                                <div className="font-mono font-bold text-sm bg-[#f4e4bc] border border-[#d4b483] px-2 rounded shadow-inner">{gameState.inventory[good]}</div>
                                                {gameState.inventory[good] > 0 && (
                                                    <div className="text-[9px] text-[#5c4033]">평단: {gameState.avgCost[good]}</div>
                                                )}
                                            </div>

                                            <div className="grid grid-cols-[minmax(40px,1fr)_minmax(44px,1fr)_minmax(65px,1fr)] sm:flex sm:items-center gap-1 justify-end flex-1 w-full">
                                                {isOrigin ? (
                                                    <>
                                                        <button onClick={() => handleTrade(good, true)} disabled={gameState.gameOver || gameState.gold < buyPrice || getTotalCargo() >= gameState.cargoSpace}
                                                            className="px-2 py-2 sm:py-1 bg-[#2e7d32] text-[#f4e4bc] text-xs font-bold rounded-sm hover:bg-[#1b5e20] disabled:opacity-50 shadow-sm border border-[#1b5e20] min-w-[40px]">
                                                            구매
                                                        </button>
                                                        <button onClick={() => handleBuyMax(good)} disabled={getMaxBuyQty(good) <= 0}
                                                            className="px-2 py-2 sm:py-1 bg-[#6f5a2f] text-[#f4e4bc] text-xs font-bold rounded-sm hover:bg-[#594724] disabled:opacity-50 disabled:cursor-not-allowed shadow-sm border border-[#4a3a1d] min-w-[44px]"
                                                            title={`최대 ${getMaxBuyQty(good)}개 구매`}>
                                                            최대
                                                        </button>
                                                    </>
                                                ) : (
                                                    <div className="col-span-2 sm:col-span-1 text-[10px] text-[#8b5e3c] font-bold px-1 text-center min-w-[40px] opacity-60 flex flex-col items-center justify-center leading-tight">
                                                        <Lock className="w-3 h-3 mb-0.5"/>
                                                        <span>{getOriginLabel(good)}</span>
                                                    </div>
                                                )}
                                                
                                                <button onClick={() => handleTrade(good, false)} disabled={gameState.gameOver || gameState.inventory[good] <= 0}
                                                    className={`relative px-2 py-2 sm:py-1 text-[#f4e4bc] text-xs font-bold rounded-sm hover:bg-opacity-90 disabled:opacity-50 shadow-sm border flex items-center gap-1 justify-center min-w-[65px] transition-colors
                                                        ${gameState.inventory[good] > 0 
                                                            ? (profit > 0 ? 'bg-[#2e7d32] border-[#1b5e20]' : profit < 0 ? 'bg-[#c62828] border-[#b71c1c]' : 'bg-gray-600 border-gray-700')
                                                            : 'bg-[#8b5e3c] border-[#5c3a21]'
                                                        }`}>
                                                    <span>판매</span>
                                                    {gameState.inventory[good] > 0 && (
                                                        <span className="text-[10px] ml-0.5">
                                                            {profit > 0 ? `+${profit}` : profit}
                                                        </span>
                                                    )}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                                </div>
                            </div>
                            
                            <div className="mt-4 flex flex-col sm:flex-row gap-2 sm:justify-between sm:items-center bg-[#fff8e1]/40 p-2 rounded border border-[#d4b483] shrink-0">
                                <div className="text-xs font-bold text-[#5c4033]">
                                    적재량: {getTotalCargo()} / {gameState.cargoSpace}
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                                    <button
                                        onClick={handleSellAll}
                                        disabled={getTotalCargo() === 0}
                                        className="flex items-center justify-center gap-1 px-2 py-2 sm:py-1 bg-[#2f6f3e] text-[#f4e4bc] text-[10px] font-bold rounded shadow-sm hover:bg-[#255832] disabled:opacity-50 disabled:cursor-not-allowed border border-[#1f4529]"
                                        title={`현재 항구 판매 총액: ${getBulkSaleValue()} 은`}
                                    >
                                        <Coins className="w-3 h-3" /> 일괄 판매 ({getBulkSaleValue()}은)
                                    </button>
                                    <button
                                        onClick={handleUpgradeCargo}
                                        disabled={gameState.gold < upgradeCost}
                                        className="flex items-center justify-center gap-1 px-2 py-2 sm:py-1 bg-[#8b4513] text-[#f4e4bc] text-[10px] font-bold rounded shadow-sm hover:bg-[#6d3710] disabled:opacity-50 disabled:cursor-not-allowed border border-[#5c3a21]"
                                        title={`비용: ${upgradeCost} 은`}
                                    >
                                        <Ship className="w-3 h-3" /> 증축 ({upgradeCost}은)
                                    </button>
                                </div>
                            </div>

                            <div className="mt-3 bg-[#fff8e1]/60 p-3 rounded border border-[#d4b483] relative shrink-0">
                                <div className="absolute -top-3 left-3 bg-[#8b5e3c] text-[#f4e4bc] text-[10px] font-bold px-2 py-0.5 rounded shadow-sm flex items-center gap-1">
                                    <Scroll className="w-3 h-3" /> 초보 선장을 위한 지침서
                                </div>
                                <ul className="text-xs text-[#5c4033] space-y-1 mt-1 list-disc pl-4 font-bold leading-relaxed">
                                    <li><span className="text-[#8b4513]">목표:</span> 200일 동안 최고의 수익을 올리세요.</li>
                                    <li><span className="text-[#8b4513]">무역:</span> <span className="text-red-700">특산물 구매는 원산지</span>에서만! 산지에 되팔면 손해가 납니다.</li>
                                    <li><span className="text-[#8b4513]">항해:</span> 지도에서 목적지를 선택하세요. 거리가 멀수록 오래 걸립니다.</li>
                                    <li><span className="text-[#8b4513]">퀴즈:</span> 정답을 맞혀야 이동합니다. 틀리면 제자리에서 지연됩니다.</li>
                                </ul>
                            </div>
                        </div>

                        {/* 오른쪽: 지도 (자유 이동) */}
                        <div className="w-full lg:w-[400px] bg-[#d4b483]/30 p-3 sm:p-5 lg:p-6 lg:border-l border-t lg:border-t-0 border-[#8b5e3c]/30 flex flex-col relative z-10 backdrop-blur-sm min-h-0 h-auto lg:h-full overflow-visible lg:overflow-hidden">
                            <h2 className="text-xl font-bold mb-3 flex items-center gap-2 text-[#3e2b20] shrink-0"><Compass className="w-5 h-5 text-[#8b4513]" /> 항해 지도</h2>
                            <PixelMap currentLocation={gameState.location} />
                            
                            <h2 className="text-lg font-bold mb-2 flex items-center gap-2 text-[#3e2b20] mt-4 shrink-0"><Navigation className="w-5 h-5 text-[#8b4513]" /> 자유 항해 (목적지 선택)</h2>
                            <div className="space-y-2 overflow-y-visible lg:overflow-y-auto no-scrollbar flex-1 pb-2 min-h-0">
                                {Object.keys(PORTS).filter(id => id !== gameState.location).map(destId => {
                                    const days = calculateDays(destId);
                                    return (
                                        <button key={destId} onClick={() => startVoyage(destId)} disabled={gameState.gameOver}
                                            className="w-full p-3 bg-[#f4e4bc] border-2 border-[#8b5e3c] rounded-sm hover:bg-[#fff8e1] hover:border-[#5c3a21] transition-all text-left group shadow-md relative overflow-hidden">
                                            <div className="flex justify-between items-center">
                                                <div className="font-bold text-[#5c3a21] group-hover:text-[#3e2b20]">{PORTS[destId].name} <span className="text-xs font-normal text-[#8b5e3c]">({PORTS[destId].continent})</span></div>
                                                <div className={`text-xs flex items-center gap-1 font-bold ${days > 20 ? 'text-red-600' : 'text-[#8b5e3c]'}`}>
                                                    <Wind className="w-3 h-3" /> {days}일 소요
                                                </div>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* --- 모달들 --- */}
                    {activeModal === 'goodInfo' && selectedGood && (
                        <Modal title={GOODS_INFO[selectedGood].name} onClose={() => setActiveModal(null)}>
                            <div className="flex flex-col items-center mb-4">
                                <div className="p-6 bg-[#e8d5a5] rounded-full border-4 border-[#8b5e3c] mb-4 shadow-inner"><div className="transform scale-[2.0]"><PixelItemIcon type={selectedGood} /></div></div>
                                <p className="leading-relaxed text-center">{GOODS_INFO[selectedGood].desc}</p>
                                <div className="mt-4 text-sm font-bold text-[#8b4513]">
                                    {GOODS_INFO[selectedGood]?.origin === 'any' ? '원산지: 공용 (모든 항구)' : 
                                     `원산지: ${getOrigins(selectedGood).map(o => PORTS[o]?.name || o).join(', ')}`}
                                </div>
                                <div className="mt-2 text-sm font-bold text-[#3e2b20] bg-[#fff8e1] border border-[#d4b483] rounded-sm px-3 py-2">
                                    {canBuyHere(selectedGood) ? `현재 항구 구매가: ${getBuyPrice(selectedGood)} 은` : '현재 항구에서는 구매할 수 없습니다.'}
                                    <div className="text-xs text-[#8b5e3c] mt-1">{getMarketNote(selectedGood)}</div>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {activeModal === 'quiz' && currentQuiz && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/85 backdrop-blur-md p-2 sm:p-4">
                            <div className="bg-[#2a1d15] w-full max-w-lg max-h-[92vh] overflow-y-auto rounded-lg border-[4px] border-[#d4a065] shadow-2xl p-4 sm:p-8 relative animate-scale-in" style={{ backgroundImage: "url('https://www.transparenttextures.com/patterns/wood-pattern.png')" }}>
                                <div className="static sm:absolute sm:-top-6 sm:left-1/2 sm:transform sm:-translate-x-1/2 bg-[#d4a065] text-[#2a1d15] px-4 sm:px-8 py-2 rounded-sm font-bold shadow-lg border-2 border-[#8b5e3c] flex items-center justify-center gap-2 mb-4 sm:mb-0">
                                    <Compass className="w-5 h-5 animate-spin-slow" /> 항해의 기로
                                </div>
                                <div className="mt-0 sm:mt-6 mb-5 sm:mb-8 p-3 sm:p-4 bg-[#1a1a1a]/50 border border-[#8b5e3c]/30 rounded text-center">
                                    <h3 className="text-lg sm:text-xl font-bold text-[#eecfa1] leading-relaxed drop-shadow-md">{currentQuiz.question}</h3>
                                </div>
                                <div className="space-y-2 sm:space-y-3">
                                    {currentQuiz.options.map((option, idx) => (
                                        <button key={idx} onClick={() => handleQuizResult(idx === currentQuiz.answer)}
                                            className="w-full p-3 sm:p-4 text-left bg-[#3e2b20] text-[#eecfa1] border border-[#5c4033] hover:bg-[#5c4033] hover:border-[#d4a065] rounded-sm transition-all flex items-center justify-between group shadow-md">
                                            <span className="font-serif text-base sm:text-lg">{option}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'result' && quizResultInfo && (
                        <Modal title={quizResultInfo.success ? "항해 성공" : "항해 실패"} onClose={() => setActiveModal(null)}>
                            <div className="flex flex-col items-center gap-4 text-center">
                                {quizResultInfo.success ? <CheckCircle className="w-16 h-16 text-[#2e7d32]" /> : <XCircle className="w-16 h-16 text-[#c62828]" />}
                                <p className="text-xl font-bold text-[#3e2b20]">{quizResultInfo.text}</p>
                                {quizResultInfo.event && (
                                    <div className={`w-full p-3 rounded-sm border-2 border-dashed flex flex-col items-center gap-1 animate-bounce shadow-sm ${quizResultInfo.event.type === 'good' ? 'bg-[#e8f5e9] border-[#2e7d32] text-[#1b5e20]' : 'bg-[#ffebee] border-[#c62828] text-[#b71c1c]'}`}>
                                        <div className="font-bold flex items-center gap-2"><Ship className="w-4 h-4" /> {quizResultInfo.event.name}</div>
                                        <p className="text-sm font-serif">{quizResultInfo.event.text}</p>
                                    </div>
                                )}
                                {quizResultInfo.success && (
                                    <div className="bg-[#fff8e1] p-4 rounded-sm border-t-4 border-[#8b4513] w-full mt-2 shadow-md text-left">
                                        <p className="text-xs font-bold text-[#8b5e3c] mb-1 flex items-center gap-1"><BookOpen className="w-3 h-3" /> 역사 한 줄</p>
                                        <p className="leading-relaxed font-bold text-[#3e2b20] font-serif">"{quizResultInfo.fact}"</p>
                                    </div>
                                )}
                            </div>
                        </Modal>
                    )}

                    {activeModal === 'journal' && (
                        <Modal title="선장의 탐험 일지" onClose={() => setActiveModal(null)}>
                            {gameState.unlockedFacts.length === 0 ? (
                                <div className="text-center py-12 text-[#8b5e3c] border-2 border-dashed border-[#d4b483] rounded-lg">
                                    <p className="font-bold text-lg">아직 기록된 역사가 없습니다.</p>
                                    <p className="text-sm mt-2">항해를 떠나 퀴즈를 맞히세요.</p>
                                </div>
                            ) : (
                                <ul className="space-y-4 max-h-[300px] overflow-y-auto pr-4 custom-scrollbar">
                                    {gameState.unlockedFacts.map((fact, idx) => (
                                        <li key={idx} className="bg-[#fff8e1] p-3 rounded-sm shadow-md border border-[#d4b483] text-[#3e2b20] font-serif">"{fact}"</li>
                                    ))}
                                </ul>
                            )}
                        </Modal>
                    )}

                    {gameState.gameOver && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
                            <div className="bg-[#f4e4bc] w-full max-w-md max-h-[92vh] overflow-y-auto rounded-lg border-[5px] sm:border-[8px] border-[#5c3a21] shadow-2xl p-5 sm:p-10 text-center animate-scale-in" style={{backgroundImage: "url('https://www.transparenttextures.com/patterns/wood-pattern.png')"}}>
                                <Trophy className="w-16 h-16 sm:w-20 sm:h-20 mx-auto text-[#FFD700] mb-4 drop-shadow-md" />
                                <h2 className="text-3xl sm:text-4xl font-bold text-[#3e2b20] mb-2">{gameState.gold < 0 ? "파산..." : "항해 종료"}</h2>
                                <p className="text-[#8b5e3c] mb-6 font-bold">{gameState.gold < 0 ? "자금이 바닥나 여정을 멈춥니다." : "위대한 항해를 마쳤습니다."}</p>
                                <div className="bg-[#fff8e1] p-4 rounded-sm border-2 border-[#d4b483] mb-6 shadow-inner">
                                    <div className="text-sm text-[#8b5e3c] font-bold">최종 자금</div>
                                    <div className="text-3xl sm:text-4xl font-bold text-[#3e2b20] mb-2 font-mono break-words">{gameState.gold} 은</div>
                                    <div className="text-xl sm:text-2xl font-bold text-[#8b4513] font-serif">{getRank()}</div>
                                </div>
                                <button onClick={() => window.location.reload()} className="w-full px-8 py-3 bg-[#2e7d32] text-[#f4e4bc] rounded-sm hover:bg-[#1b5e20] transition-colors font-bold shadow-lg border-b-4 border-[#1b5e20] active:border-b-0 active:translate-y-1">
                                    {gameState.gold < 0 ? "다시 도전하기" : "새로운 항해 시작"}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HistoryTradeGame />);
    </script>
</body>
</html>
