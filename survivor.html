<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1914-1918: The Great War</title>
    <style>
        /* --- 기본 테마 --- */
        :root {
            --bg-color: #1a1814;
            --text-color: #ccc;
            --accent-gold: #c5a065;
            --btn-bg: #2a2a2a;
            --item-green: #2e7d32;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.7;
            background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #game-container {
            width: 900px;
            max-width: 95%;
            background-color: #2e2b26;
            padding: 50px;
            border: 2px solid #5c5042;
            box-shadow: 0 20px 60px rgba(0,0,0,0.95);
            position: relative;
            display: none;
        }

        /* --- [UI] 상단 헤더 --- */
        .game-header {
            border-bottom: 1px solid #4a4a4a;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .game-title {
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 1.4em;
            font-family: 'Times New Roman', serif;
            margin-bottom: 5px;
        }
        .game-subtitle {
            color: #aaa;
            font-size: 1em;
            font-weight: bold;
        }
        .stage-box {
            text-align: right;
            color: #aaa;
        }

        /* --- [UI] 상태창 (가로형) --- */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
            background: #1f1d1a;
            padding: 20px;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
        }
        .stat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-header {
            width: 100%; display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; color: #aaa; font-weight: bold;
        }
        .stat-bar-bg { 
            width: 100%; height: 12px; background: #111; 
            border: 1px solid #444; border-radius: 2px; overflow: hidden; 
        }
        .stat-bar-fill { height: 100%; transition: width 0.5s; width: 100%; }
        .blind-bar { width: 100% !important; background-color: #333 !important; }

        /* --- [UI] 인벤토리 --- */
        .inventory-wrapper {
            background: #1f1d1a;
            border: 1px solid #4a4a4a;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
        }
        .inv-label { font-weight: bold; color: var(--accent-gold); margin-right: 10px; }
        .inv-slots { display: flex; gap: 15px; }
        .inv-slot {
            width: 55px; height: 55px; background-color: #141414;
            border: 2px solid #3d3d3d; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2em; cursor: help; position: relative; transition: 0.2s;
        }
        .inv-slot:hover { border-color: var(--accent-gold); transform: translateY(-2px); }
        .inv-slot.empty { opacity: 0.2; font-size: 1em; color: #555; border-style: dashed; }
        
        .inv-slot .tooltip {
            visibility: hidden; min-width: 100px; background-color: #000;
            color: #fff; text-align: center; border-radius: 4px; padding: 8px 12px;
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            font-size: 0.85rem; z-index: 10; border: 1px solid #555; white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .inv-slot:hover .tooltip { visibility: visible; opacity: 1; }

        /* --- 텍스트 및 선택지 --- */
        #scenario-text {
            font-size: 1.3em; line-height: 1.8; margin-bottom: 35px;
            white-space: pre-wrap; min-height: 120px; color: #f0f0f0;
            border-left: 5px solid #5c5042; padding: 20px 30px;
            background: rgba(0,0,0,0.25); border-radius: 4px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        .choice-btn {
            padding: 22px; background-color: var(--btn-bg); color: #ccc;
            border: 1px solid #444; width: 100%; text-align: left;
            cursor: pointer; font-size: 1.15em; transition: 0.2s; 
            font-family: inherit; font-weight: bold; border-radius: 6px;
        }
        .choice-btn:hover { 
            background-color: #383838; color: var(--accent-gold); 
            border-left: 5px solid var(--accent-gold); padding-left: 27px; 
        }

        /* 아이템 획득 버튼 (녹색) */
        .get-item-btn { background-color: #1b2e1e; border: 1px solid #4caf50; color: #81c784; }
        .get-item-btn:hover { background-color: #2a472e; color: #fff; border-left-color: #4caf50; }

        /* 아이템 사용/거래 버튼 */
        .use-item-btn { background-color: #152215; border: 1px solid #66bb6a; }
        .trade-btn { background-color: #2b2500; border: 1px solid #ffd700; color: #ffe066; }
        
        /* 하드모드 버튼 */
        .hard-mode-btn { border: 1px solid #555 !important; background: #222 !important; color: #ccc !important; }
        .hard-mode-btn:hover { border-color: var(--accent-gold) !important; color: #fff !important; }

        .tag { font-size: 0.75em; padding: 3px 10px; border-radius: 4px; float: right; margin-left: 10px; font-weight: bold; color: #000; }
        .tag-get { background: #4caf50; }
        .tag-use { background: #66bb6a; } 
        .tag-trade { background: #ffd700; }

        /* 결과 피드백 효과 */
        #feedback-area {
            background: #1f1d1a; border: 2px solid var(--accent-gold); 
            padding: 30px; margin-bottom: 30px; display: none; 
            color: #e0c097; line-height: 1.7; font-size: 1.1em;
            animation: slideUpFade 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .fact-title { font-weight: bold; display: block; margin-bottom: 15px; color: #fff; font-size: 1.2em; border-bottom: 1px solid #444; padding-bottom: 10px;}

        /* 다음 장 버튼 */
        .next-btn {
            background-color: #3e3625; color: #fff; border: 1px solid var(--accent-gold);
            text-align: center; margin-top: 10px;
        }
        .next-btn:hover {
            background-color: var(--accent-gold); color: #000; border-color: #fff;
            padding-left: 22px;
        }

        /* 랜덤 이벤트 알림 */
        #random-event-msg { background: #1b3320; border: 1px solid #4caf50; color: #81c784; padding: 15px; margin-bottom: 20px; display: none; text-align: center; font-weight: bold; animation: slideDown 0.5s; }

        /* 진행도 */
        .progress-container { width: 100%; background: #222; height: 8px; margin-bottom: 15px; border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-gold); width: 0%; transition: width 0.5s; }
        
        /* 시작 화면 UI */
        #start-screen { width: 800px; max-width: 95%; background-color: #2e2b26; padding: 60px; border: 2px solid #5c5042; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
        h1 { color: var(--accent-gold); font-family: 'Times New Roman', serif; letter-spacing: 2px; margin-bottom: 10px; font-size: 2.5em; }
        .intro-affiliation { color: #aaa; font-size: 1.1em; margin-bottom: 40px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 20px; display: inline-block; }
        
        .difficulty-btn { display: block; width: 100%; margin: 15px 0; padding: 25px; font-size: 1.2em; cursor: pointer; border: 1px solid #555; background: #222; color: #ccc; font-weight: bold; transition:0.3s; }
        .difficulty-btn:hover { background: #333; border-color: var(--accent-gold); color: #fff; transform: scale(1.02); }
        
        .footer-credit { margin-top: 50px; padding-top: 20px; border-top: 1px solid #444; text-align: center; font-size: 0.9em; color: #666; }
        .typewriter-cursor::after { content: '█'; animation: blink 0.8s infinite; color: var(--accent-gold); margin-left: 5px;}
        .highlight-text { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .danger { color: #ff4444 !important; animation: blink 1.5s infinite; }
        .item-result {
            margin-top: 16px; padding-top: 14px; border-top: 1px solid #514838;
            display: flex; flex-wrap: wrap; gap: 8px; font-size: 0.9em;
        }
        .item-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 999px; background: #151f16;
            border: 1px solid #4caf50; color: #9be7a3; font-weight: bold;
        }
        .ending-record {
            margin-top: 28px; padding: 18px; background: rgba(0,0,0,0.22);
            border: 1px solid #5c5042; border-radius: 6px; color: #d8c6a5;
        }
        .ending-record h3 { color: var(--accent-gold); margin: 0 0 10px; font-size: 1.05em; }
        .ending-record ol { margin: 0; padding-left: 22px; }
        .ending-record li { margin: 8px 0; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; height: 0; } to { opacity: 1; height: auto; } }

        @media (max-width: 700px) {
            body {
                align-items: flex-start;
                min-height: 100svh;
                padding: 10px;
                box-sizing: border-box;
            }
            #start-screen, #game-container {
                width: 100%;
                max-width: 100%;
                padding: 22px 16px;
                box-sizing: border-box;
            }
            h1 {
                font-size: 2em;
                line-height: 1.15;
            }
            .game-header {
                align-items: flex-start;
                gap: 12px;
            }
            .game-title {
                font-size: 1.05em;
                line-height: 1.2;
            }
            .stage-box {
                min-width: 72px;
                font-size: 0.9em;
            }
            .stats-panel {
                flex-direction: column;
                gap: 12px;
                padding: 14px;
            }
            .inventory-wrapper {
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
                padding: 14px;
            }
            .inv-slots {
                width: 100%;
                justify-content: space-between;
                gap: 8px;
            }
            .inv-slot {
                width: 48px;
                height: 48px;
                font-size: 1.6em;
            }
            #scenario-text {
                font-size: 1.05em;
                line-height: 1.7;
                padding: 16px;
                margin-bottom: 22px;
            }
            .choice-btn, .difficulty-btn {
                padding: 16px;
                font-size: 1em;
                line-height: 1.5;
            }
            .choice-btn:hover {
                padding-left: 16px;
                border-left-width: 1px;
            }
            .tag {
                float: none;
                display: inline-block;
                margin-top: 8px;
                margin-left: 0;
            }
            #feedback-area {
                padding: 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>1914 - 1918<br>THE GREAT WAR</h1>
    <div class="intro-affiliation">소속: 3국 협상 (영국군 제4보병연대)</div>
    
    <button class="difficulty-btn" onclick="selectDifficulty('normal')">
        <strong>징집병 (NORMAL)</strong><br>
        <span style="font-size: 0.8em; color: #888;">[추천] 힌트 제공 / 게이지 표시</span>
    </button>
    
    <button class="difficulty-btn" onclick="selectDifficulty('hard')">
        <strong>베테랑 (VETERAN)</strong><br>
        <span style="font-size: 0.8em; color: #888;">[리얼리즘] 힌트 없음 / 게이지 숨김</span>
    </button>
</div>

<div id="game-container">
    <div class="game-header">
        <div>
            <div class="game-title">1914-1918: TRENCH SURVIVOR</div>
        </div>
        <div class="stage-box">
            <span id="stage-text" style="font-weight:bold; font-size:1.1em; color:#ddd;">입대일</span><br>
            <span style="font-size:0.8em; opacity:0.6;">(20 Stages)</span>
        </div>
    </div>
    
    <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>

    <div class="stats-panel">
        <div class="stat-box">
            <div class="stat-header"><span>PHYSICAL (신체)</span> <span id="hp-text">100</span></div>
            <div class="stat-bar-bg"><div id="hp-bar" class="stat-bar-fill" style="width:100%; background:#d64545;"></div></div>
        </div>
        <div class="stat-box">
            <div class="stat-header"><span>MENTAL (정신)</span> <span id="moral-text">100</span></div>
            <div class="stat-bar-bg"><div id="moral-bar" class="stat-bar-fill" style="width:100%; background:#4dabf7;"></div></div>
        </div>
        <div class="stat-box">
            <div class="stat-header"><span>HUMANITY (인간성)</span> <span id="human-text">50</span></div>
            <div class="stat-bar-bg"><div id="human-bar" class="stat-bar-fill" style="width:50%; background:#69db7c;"></div></div>
        </div>
    </div>

    <div class="inventory-wrapper">
        <span class="inv-label">🎒 BELT KITS:</span>
        <div class="inv-slots" id="inv-grid">
            <div class="inv-slot empty">+</div><div class="inv-slot empty">+</div><div class="inv-slot empty">+</div><div class="inv-slot empty">+</div>
        </div>
    </div>

    <div id="random-event-msg"></div>
    <div id="feedback-area"></div>
    <div id="scenario-text"></div>
    <div id="choices" class="btn-group"></div>

    <div class="footer-credit">Developed by <span>Son Seoyul</span></div>
</div>

<script>
    const TOTAL_STAGES = 20;
    
    const itemData = {
        '가족사진': { icon: '🖼️', desc: '가족사진' },
        '주머니칼': { icon: '🔪', desc: '주머니칼' },
        '초콜릿': { icon: '🍫', desc: '초콜릿' },
        '금회중시계': { icon: '🕰️', desc: '금회중시계' },
        '약': { icon: '💊', desc: '응급 약품' }
    };

    let state = { difficulty: 'normal', hp: 100, moral: 100, humanity: 50, inventory: [], history: [], step: 0, scene: 'intro' };

    function selectDifficulty(mode) {
        state.difficulty = mode;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        if (mode === 'hard') { state.hp = 80; state.moral = 80; }
        updateUI(); renderScene();
    }

    const randomDrops = { 's3': '주머니칼', 's7': '가족사진', 's11': '초콜릿' };

    function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[char]));
    }

    function getSceneTitle(sceneId) {
        if (sceneId === 'intro') return '입대일';
        const scene = scenarios[sceneId];
        if (!scene || !scene.text) return sceneId;
        return scene.text.split('\n')[0].replace(/^\[(\d+)\/20\]\s*/, '');
    }

    function getChoiceEffects(choice) {
        const effects = [];
        if (choice.req) effects.push(`사용: ${choice.req}`);
        if (choice.loseItem) effects.push(`소모: ${choice.loseItem}`);
        if (choice.item) effects.push(`획득: ${choice.item}`);
        if (choice.damage) effects.push(`부상 위험 +${choice.damage}`);
        if (choice.hp) effects.push(`신체 ${choice.hp > 0 ? '+' : ''}${choice.hp}`);
        if (choice.bonus) effects.push(`회복 +${choice.bonus}`);
        if (choice.moral) effects.push(`정신 ${choice.moral > 0 ? '+' : ''}${choice.moral}`);
        if (choice.humanity) effects.push(`인간성 ${choice.humanity > 0 ? '+' : ''}${choice.humanity}`);
        if (choice.checkStat) effects.push('정신력 판정');
        return effects;
    }

    function getItemResultHtml(choice) {
        const chips = [];
        if (choice.req) chips.push(`사용한 물건: ${choice.req}`);
        if (choice.loseItem) chips.push(`잃은 물건: ${choice.loseItem}`);
        if (choice.item) chips.push(`새로 얻은 물건: ${choice.item}`);
        if (chips.length === 0) return '';
        return `<div class="item-result">${chips.map(text => `<span class="item-chip">${escapeHtml(text)}</span>`).join('')}</div>`;
    }

    function getEndingProfile(isDead) {
        if (isDead) {
            return {
                title: '전사 통지서',
                label: '전장의 이름 없는 희생자',
                body: '귀하의 가족은 전장에서 돌아오지 못했습니다.<br>그가 남긴 선택들은 짧은 기록으로만 남았지만, 그 삶은 숫자 하나로 줄어들 수 없습니다.'
            };
        }
        if (state.humanity >= 80) {
            return {
                title: '성자의 귀환',
                label: '인간성을 지킨 생존자',
                body: '1918년 11월 11일, 전쟁이 끝났습니다.<br>당신은 살아 돌아왔고, 더 어려운 일도 해냈습니다. 참호 속에서도 사람을 사람으로 보았습니다.<br><br>고향 사람들은 당신을 영웅이라 부르지만, 당신은 조용히 답합니다. <span class="highlight-text">“나는 끝까지 사람이려 했다.”</span>'
            };
        }
        if (state.moral <= 30) {
            return {
                title: '부서진 생존자',
                label: '몸은 돌아왔지만 마음은 전선에 남은 병사',
                body: '1918년 11월 11일, 총성은 멎었습니다.<br>그러나 당신의 밤에는 여전히 포탄이 떨어집니다. 식탁 앞에서도 흙냄새와 비명소리가 사라지지 않습니다.<br><br>당신은 살아남았습니다. 하지만 <span class="highlight-text">살아남는 일과 회복되는 일은 서로 달랐습니다.</span>'
            };
        }
        if (state.humanity <= 25) {
            return {
                title: '냉혹한 베테랑',
                label: '살아남기 위해 많은 것을 버린 병사',
                body: '1918년 11월 11일, 당신은 고향으로 돌아왔습니다.<br>살아남기 위해 외면했고, 빼앗았고, 때로는 먼저 쏘았습니다. 사람들은 당신의 침묵을 강인함이라 착각합니다.<br><br>하지만 당신은 알고 있습니다. <span class="highlight-text">전쟁은 당신 안의 어떤 문을 닫아버렸습니다.</span>'
            };
        }
        if (state.hp >= 70 && state.moral >= 70) {
            return {
                title: '훈장을 받은 생존자',
                label: '침착함으로 버틴 베테랑',
                body: '1918년 11월 11일, 당신은 부대의 생존자 명단에 이름을 올렸습니다.<br>상관은 당신의 침착함과 판단을 칭찬했고, 가슴에는 작은 훈장이 달렸습니다.<br><br>그러나 훈장은 가벼웠고, 기억은 무거웠습니다. <span class="highlight-text">영광보다 오래 남은 것은 얼굴들이었습니다.</span>'
            };
        }
        return {
            title: '평범한 귀환병',
            label: '역사의 틈에서 살아남은 병사',
            body: '1918년 11월 11일, 전쟁이 끝났습니다.<br>당신은 특별한 영웅도, 완전한 악인도 아니었습니다. 춥고 두려운 날들 속에서 흔들리며 선택했고, 운 좋게 살아 돌아왔습니다.<br><br>기차 창밖으로 고향이 보일 때, 당신은 깨닫습니다. <span class="highlight-text">평범하게 살아 돌아온 것 자체가 기적이었다는 것을.</span>'
        };
    }

    function getWarRecordHtml() {
        const recent = state.history.slice(-5);
        const list = recent.length
            ? recent.map(entry => {
                const effects = entry.effects.length ? ` <small>(${escapeHtml(entry.effects.join(', '))})</small>` : '';
                return `<li><strong>${escapeHtml(entry.stage)}</strong>: ${escapeHtml(entry.choice)}${effects}</li>`;
            }).join('')
            : '<li>기록된 선택이 없습니다.</li>';
        const inventoryText = state.inventory.length ? state.inventory.map(escapeHtml).join(', ') : '남은 물건 없음';
        return `<div class="ending-record"><h3>나의 전쟁 기록</h3><ol>${list}</ol><p><strong>마지막 상태</strong>: 신체 ${state.hp}, 정신 ${state.moral}, 인간성 ${state.humanity}</p><p><strong>남은 물건</strong>: ${inventoryText}</p></div>`;
    }

    function checkRandomDrop(scene) {
        if (!randomDrops[scene]) return; 
        const targetItem = randomDrops[scene];
        if (state.inventory.includes(targetItem)) return; 
        const chance = state.difficulty === 'hard' ? 0.3 : 0.6;
        if (Math.random() < chance) {
            state.inventory.push(targetItem);
            const msgBox = document.getElementById('random-event-msg');
            msgBox.innerHTML = `<strong>🍀 행운!</strong> 주변에서 <strong>[${targetItem}]</strong>을 발견했습니다!`;
            msgBox.style.display = 'block';
            setTimeout(() => { msgBox.style.display = 'none'; }, 4000);
            updateUI();
        }
    }

    function renderScene() {
        if (state.hp <= 0) { showEnding(true); return; }
        if (state.scene === 'ending') { showEnding(false); return; }
        document.getElementById('random-event-msg').style.display = 'none';
        checkRandomDrop(state.scene);
        const data = scenarios[state.scene];
        document.getElementById('scenario-text').innerText = data.text;
        
        let currentStageNum = 0;
        let dayText = "입대일";
        if(state.scene !== 'intro') {
            currentStageNum = parseInt(state.scene.replace('s', ''));
            dayText = `Day ${currentStageNum}`;
        }
        state.step = currentStageNum;
        document.getElementById('stage-text').innerText = dayText;
        document.getElementById('progress-bar').style.width = `${(currentStageNum / TOTAL_STAGES) * 100}%`;

        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        document.getElementById('feedback-area').style.display = 'none';

        data.choices.forEach(choice => {
            if (choice.req && !state.inventory.includes(choice.req)) return;
            const btn = document.createElement('button');
            btn.classList.add('choice-btn');
            
            if (state.difficulty === 'hard') {
                btn.classList.add('hard-mode-btn');
                btn.innerText = choice.text;
            } else {
                if (choice.item && choice.loseItem) { btn.classList.add('trade-btn'); btn.innerHTML = `${choice.text} <span class="tag tag-trade"> 거래</span>`; }
                else if (choice.req) { btn.classList.add('use-item-btn'); btn.innerHTML = `${choice.text} <span class="tag tag-use"> 사용</span>`; }
                else if (choice.item) { btn.classList.add('get-item-btn'); btn.innerHTML = `${choice.text} <span class="tag tag-get"> 획득</span>`; }
                else { btn.innerText = choice.text; }
            }
            btn.onclick = () => handleChoice(choice);
            choicesDiv.appendChild(btn);
        });
        updateUI();
    }

    function handleChoice(choice) {
        const currentStageTitle = getSceneTitle(state.scene);
        state.history.push({
            stage: currentStageTitle,
            choice: choice.text,
            effects: getChoiceEffects(choice)
        });

        if (choice.item) state.inventory.push(choice.item);
        if (choice.loseItem) {
            const idx = state.inventory.indexOf(choice.loseItem);
            if (idx > -1) state.inventory.splice(idx, 1);
        }
        
        let damage = choice.damage || 0;
        let feedback = choice.feedback;

        if (choice.checkStat === 'moral') {
            if (state.moral >= 70) {
                damage = 15; feedback += " 강인한 정신력으로 이겨냈습니다.";
            } else {
                damage = 50; feedback += " 정신력이 약해 병마를 이기지 못했습니다.";
            }
        }

        let dmgMult = (state.difficulty === 'hard') ? 1.5 : 1.0;
        let healMult = (state.difficulty === 'hard') ? 0.5 : 1.0;

        if (damage > 0) state.hp -= Math.floor(damage * dmgMult);
        if (choice.bonus) state.hp += Math.floor(choice.bonus * healMult);
        if (choice.hp) state.hp += Math.floor(choice.hp * ((choice.hp > 0) ? healMult : dmgMult));
        if (choice.moral) state.moral += Math.floor(choice.moral * ((choice.moral > 0) ? healMult : dmgMult));
        if (choice.humanity) state.humanity += choice.humanity;

        state.hp = Math.min(100, Math.max(0, state.hp));
        state.moral = Math.min(100, Math.max(0, state.moral));
        state.humanity = Math.min(100, Math.max(0, state.humanity));

        state.scene = choice.next;

        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        const fbArea = document.getElementById('feedback-area');
        fbArea.innerHTML = `<span class="fact-title">📝 종군 일지</span>${feedback}${getItemResultHtml(choice)}`;
        fbArea.style.display = 'block';

        const nextBtn = document.createElement('button');
        nextBtn.classList.add('choice-btn', 'next-btn'); 
        nextBtn.innerText = "다음 장으로 넘기기 ▶";
        nextBtn.onclick = () => renderScene();
        choicesDiv.appendChild(nextBtn);
        updateUI();
    }

    function updateUI() {
        const grid = document.getElementById('inv-grid');
        grid.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const slot = document.createElement('div');
            if (i < state.inventory.length) {
                const itemName = state.inventory[i];
                const item = itemData[itemName] || { icon: '📦', desc: itemName };
                slot.className = 'inv-slot';
                slot.innerHTML = `${item.icon}<span class="tooltip">${item.desc}</span>`;
            } else { slot.className = 'inv-slot empty'; slot.innerText = '+'; }
            grid.appendChild(slot);
        }
        
        const hpBar = document.getElementById('hp-bar');
        const moralBar = document.getElementById('moral-bar');
        const humanBar = document.getElementById('human-bar');
        
        hpBar.style.width = state.hp + '%';
        moralBar.style.width = state.moral + '%';
        humanBar.style.width = state.humanity + '%';

        if (state.difficulty === 'hard') {
            hpBar.className = "stat-bar-fill blind-bar";
            moralBar.className = "stat-bar-fill blind-bar";
            humanBar.className = "stat-bar-fill blind-bar";
            
            document.getElementById('hp-text').innerText = state.hp > 70 ? "양호" : "위험";
            document.getElementById('moral-text').innerText = state.moral > 70 ? "안정" : "불안";
            
            let hText = "보통";
            if(state.humanity >= 80) hText = "숭고";
            else if(state.humanity <= 30) hText = "비정";
            document.getElementById('human-text').innerText = hText;
        } else {
            hpBar.className = "stat-bar-fill";
            moralBar.className = "stat-bar-fill";
            humanBar.className = "stat-bar-fill";
            
            document.getElementById('hp-text').innerText = state.hp;
            document.getElementById('moral-text').innerText = state.moral;
            document.getElementById('human-text').innerText = state.humanity;
        }
        
        if(state.hp < 30) document.getElementById('hp-text').classList.add('danger');
        else document.getElementById('hp-text').classList.remove('danger');
    }

    function typeWriter(text, elementId, speed = 30) {
        const target = document.getElementById(elementId);
        target.innerHTML = '';
        target.classList.add('typewriter-cursor');
        let i = 0;
        function type() {
            if (i < text.length) {
                if (text.charAt(i) === '<') {
                    let tag = '';
                    while (text.charAt(i) !== '>') { tag += text.charAt(i); i++; }
                    tag += '>'; i++; target.innerHTML += tag;
                } else { target.innerHTML += text.charAt(i); i++; }
                setTimeout(type, speed);
            } else { target.classList.remove('typewriter-cursor'); }
        }
        type();
    }

    function showEnding(isDead) {
        document.getElementById('choices').innerHTML = '<button class="choice-btn next-btn" onclick="location.reload()">처음부터 다시 하기</button>';
        document.getElementById('feedback-area').style.display = 'none';

        const ending = getEndingProfile(isDead);
        let content = ending.body;
        if (state.inventory.includes('가족사진')) content += "<br><br>품속의 가족사진은 구겨졌지만, 마지막까지 당신을 붙들어 주었습니다.";
        if (state.inventory.includes('금회중시계')) content += "<br>주머니 속 금회중시계가 유난히 무겁게 느껴집니다. 살아남았다는 안도감 뒤로, 양심의 무게가 오래 남습니다.";

        document.getElementById('stage-text').innerText = isDead ? '전사' : '종전';
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('scenario-text').innerHTML = `<h2 style="color:#c5a065;">${ending.title}</h2><div class="highlight-text" style="font-weight:bold; margin-bottom:14px;">${ending.label}</div><div id="ending-typewriter" style="line-height:2.0; font-size:1.1em;"></div><div id="ending-record"></div>`;
        document.getElementById('ending-record').innerHTML = getWarRecordHtml();
        typeWriter(content, 'ending-typewriter', 28);
    }
</script>
